<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Student Records - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        .search-box { padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px; width: 250px; outline: none; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: var(--p); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .btn-view { background: #b71c1c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px 0; }
        .a4-card { background: white; width: 210mm; min-height: 297mm; padding: 12mm; margin: auto; box-sizing: border-box; border: 1px solid #000; color: #000; }
        .p-head { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #000; }
        .p-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
        .p-table td { border: 1px solid #aaa; padding: 6px 10px; font-size: 12px; }
        .sh { background: #f2f2f2; font-weight: bold; width: 22%; }
        .section-bar { background: #ddd; font-weight: bold; padding: 4px 10px; font-size: 12px; margin: 10px 0 5px 0; border: 1px solid #333; }
        .decl-box { font-size: 10.5px; margin-top: 12px; border-top: 1px solid #ccc; padding-top: 5px; line-height: 1.3; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; margin:0; border:none; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IPS Student Records</h2>
        <input type="text" class="search-box" id="searchInput" onkeyup="filterTable()" placeholder="Naam se search karein...">
    </div>
    <div class="table-wrapper">
        <table id="studentTable">
            <thead>
                <tr><th>App No</th><th>Student Name</th><th>Father's Name</th><th>Class</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;">Loading Data...</td></tr></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div id="printArea" class="a4-card"></div>
    <div class="no-print" style="text-align: center; padding: 20px;">
        <button onclick="window.print()" style="padding:10px 25px; background:black; color:white; border:none; cursor:pointer; font-weight:bold;">PRINT / SAVE PDF</button>
        <button onclick="closeModal()" style="padding:10px 25px; background:#666; color:white; border:none; margin-left:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx1Ph5VQkN24QsdBcmcA-_-zVmBv2QZAZivTb04G-CGv-kC8GyXOEEqaPYTK-YJFolH/exec';
    let allStudents = [];

    window.onload = fetchList;

    // Image Link Fixer (The Magic Formula)
    function formatImg(url) {
        if (!url) return "";
        if (url.includes("data:image")) return url;
        const id = url.match(/[-\w]{25,}/);
        return id ? `https://lh3.googleusercontent.com/u/0/d/${id[0]}=s500` : url;
    }

    async function fetchList() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            if (Array.isArray(data)) { allStudents = data; renderTable(allStudents); }
        } catch (e) { document.getElementById('tableBody').innerHTML = "Error!"; }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((s, index) => {
            const appNo = s["Application No"] || s["Application Number"] || "N/A";
            tbody.innerHTML += `<tr><td><b>${appNo}</b></td><td>${s["Name of Student"] || 'N/A'}</td><td>${s["Father's Name"] || 'N/A'}</td><td>${s["Class in which admitted"] || 'N/A'}</td><td><button class="btn-view" onclick="viewStudent(${index})">VIEW</button></td></tr>`;
        });
    }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allStudents.filter(s => (s["Name of Student"] || "").toLowerCase().includes(val));
        renderTable(filtered);
    }

    function viewStudent(index) {
        const s = allStudents[index];
        document.getElementById('modal').style.display = 'block';
        renderPrint(s);
    }

    function renderPrint(d) {
        const printArea = document.getElementById('printArea');
        const appNo = d["Application No"] || d["Application Number"] || "N/A";
        
        printArea.innerHTML = `
            <div class="p-head">
                <h2 style="margin:0; color:#b71c1c; font-size:22px;">ALIGARH MUSLIM UNIVERSITY</h2>
                <h4 style="margin:2px 0;">Session : 2026-27</h4>
                <h3 style="margin:0; font-size:18px;">IQRA PUBLIC SCHOOL</h3>
                <p style="font-weight:bold; margin:3px 0; font-size:14px;">Application Form for Admission</p>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                <div style="font-size:12px; line-height:1.6;">
                    <b>Application Number:</b> ${appNo}<br>
                    <b>Serial No of Admission:</b> ${d["Serial No. of Admission"] || '---'}<br>
                    <b>Date of Admission:</b> ${d["Date of Admission"] || '---'}
                </div>
                <div id="qrPrint"></div>
                <div style="width:105px; height:125px; border:1px solid #000; overflow:hidden; background:#f0f0f0; display:flex; align-items:center; justify-content:center;">
                    <img src="${formatImg(d["Photo of Student"])}" style="width:100%;height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                </div>
            </div>

            <div class="section-bar">PERSONAL DETAILS</div>
            <table class="p-table">
                <tr><td class="sh">Student Name</td><td>${d['Name of Student'] || ''}</td><td class="sh">Father's Name</td><td>${d["Father's Name"] || ''}</td></tr>
                <tr><td class="sh">Mother's Name</td><td>${d["Mother's Name"] || ''}</td><td class="sh">Date of Birth</td><td>${d["Date of Birth"] || ''}</td></tr>
                <tr><td class="sh">Caste</td><td>${d["Caste"] || ''}</td><td class="sh">Category</td><td>${d["Category"] || ''}</td></tr>
                <tr><td class="sh">Aadhaar Number</td><td colspan="3">${d["Aadhaar Number"] || ''}</td></tr>
            </table>

            <div class="section-bar">CONTACT & ADDRESS</div>
            <table class="p-table">
                <tr><td class="sh">Mobile Number</td><td>${d["Mobile Number"] || ''}</td><td class="sh">Residence</td><td>${d["Residence"] || d["Residence"] || ''}</td></tr>
            </table>

            <div class="section-bar">ACADEMIC DETAILS</div>
            <table class="p-table">
                <tr><td class="sh">Previous School</td><td colspan="3">${d["Name & Place of Previous School"] || ''}</td></tr>
                <tr><td class="sh">Reading Class</td><td>${d["Class in which reading"] || ''}</td><td class="sh">TC No</td><td>${d["T.C No."] || ''}</td></tr>
                <tr><td class="sh">TC Date</td><td>${d["Date of T.C"] || ''}</td><td class="sh">Admitted Class</td><td>${d["Class in which admitted"] || ''}</td></tr>
            </table>

            <div class="section-bar">BANK DETAILS</div>
            <table class="p-table">
                <tr><td class="sh">Account Holder</td><td>${d["Account Holder's Name"] || ''}</td><td class="sh">Bank Name</td><td>${d["Bank Name"] || ''}</td></tr>
                <tr><td class="sh">Account No</td><td>${d["Bank Account Number"] || ''}</td><td class="sh">IFSC Code</td><td>${d["IFSC"] || ''}</td></tr>
            </table>

            <div class="decl-box">
                <b>DECLARATION:</b><br>
                1. I solemnly undertake to accept and abide by the rules of the school.<br>
                2. I hereby affirm that the entries made by me above are true to the best of my knowledge.<br>
                3. If at any time, the entries are found incorrect, the admission may be cancelled.
            </div>

            <div style="margin-top:35px; display:flex; justify-content:space-between; font-size:12px; text-align:center;">
                <div style="width:130px;">
                    <img src="${formatImg(d["Signature"])}" style="width:100%; height:45px; object-fit:contain;" onerror="this.style.display='none'">
                    <br>_________________<br>Student Signature
                </div>
                <div><br><br>_________________<br>Guardian's Signature</div>
                <div><br><br>_________________<br>Principal's Signature</div>
            </div>
        `;
        if(appNo !== "N/A") new QRCode(document.getElementById("qrPrint"), { text: appNo, width: 60, height: 60 });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
