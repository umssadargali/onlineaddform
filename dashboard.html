<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Student Records - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        .search-box { padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px; width: 250px; outline: none; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: var(--p); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }

        .btn-view { background: #b71c1c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        /* Modal Style */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px 0; }
        .a4-card { background: white; width: 210mm; min-height: 297mm; padding: 12mm; margin: auto; box-sizing: border-box; border: 1px solid #000; position: relative; }
        
        .p-head { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #000; }
        .p-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .p-table td { border: 1px solid #ccc; padding: 7px 10px; font-size: 12.5px; }
        .sh { background: #f0f0f0; font-weight: bold; width: 22%; }
        .section-bar { background: #e9e9e9; font-weight: bold; padding: 5px 10px; font-size: 13px; margin: 15px 0 5px 0; border: 1px solid #333; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; margin:0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IPS Student Records</h2>
        <input type="text" class="search-box" id="searchInput" onkeyup="filterTable()" placeholder="Student ka naam likhein...">
    </div>

    <div class="table-wrapper">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>App No</th>
                    <th>Student Name</th>
                    <th>Father's Name</th>
                    <th>Class</th>
                    <th>Aadhaar</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" style="text-align:center;">Data loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div id="printArea" class="a4-card"></div>
    <div class="no-print" style="text-align: center; padding: 20px;">
        <button onclick="window.print()" style="padding:12px 30px; background:black; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:4px;">PRINT / SAVE PDF</button>
        <button onclick="closeModal()" style="padding:12px 30px; background:#666; color:white; border:none; margin-left:10px; cursor:pointer; border-radius:4px;">CLOSE</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx1Ph5VQkN24QsdBcmcA-_-zVmBv2QZAZivTb04G-CGv-kC8GyXOEEqaPYTK-YJFolH/exec';
    let allStudents = [];

    window.onload = fetchList;

    async function fetchList() {
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            if (Array.isArray(data)) {
                allStudents = data;
                renderTable(allStudents);
            }
        } catch (e) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="color:red; text-align:center;">Data load nahi ho paya!</td></tr>';
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((s, index) => {
            // FIXED: Dono headers check kar raha hai (No. aur Number)
            const appNo = s["Application No"] || s["Application Number"] || "N/A";
            const name = s["Name of Student"] || "N/A";
            const father = s["Father's Name"] || "N/A";
            const sClass = s["Class in which admitted"] || "N/A";
            const aadhar = s["Aadhaar Number"] || "N/A";

            tbody.innerHTML += `
                <tr>
                    <td><b>${appNo}</b></td>
                    <td>${name}</td>
                    <td>${father}</td>
                    <td>${sClass}</td>
                    <td>${aadhar}</td>
                    <td><button class="btn-view" onclick="viewStudent(${index})">VIEW</button></td>
                </tr>
            `;
        });
    }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allStudents.filter(s => 
            (s["Name of Student"] || "").toLowerCase().includes(val) || 
            (s["Application No"] || "").toLowerCase().includes(val)
        );
        renderTable(filtered);
    }

    async function viewStudent(index) {
        const s = allStudents[index];
        const modal = document.getElementById('modal');
        const printArea = document.getElementById('printArea');
        
        modal.style.display = 'block';
        printArea.innerHTML = "<h3 style='text-align:center; padding-top:100px;'>Loading Certificate & Photos...</h3>";

        try {
            // FIXED: Hum Name aur Aadhar bhej rahe hain search ke liye
            const res = await fetch(`${scriptURL}?searchName=${encodeURIComponent(s["Name of Student"])}&searchAadhar=${s["Aadhaar Number"]}`);
            const fullData = await res.json();
            
            if (fullData === "Not Found") {
                renderPrint(s); // Agar naya data na mile toh purana hi dikha do
            } else {
                renderPrint(fullData); // Isme Base64 photo hogi
            }
        } catch(e) {
            console.error("Fetch Error:", e);
            renderPrint(s);
        }
    }

    function renderPrint(d) {
        const printArea = document.getElementById('printArea');
        const appNo = d["Application No"] || d["Application Number"] || "N/A";
        
        printArea.innerHTML = `
            <div class="p-head">
                <h2 style="margin:0; color:#b71c1c;">ALIGARH MUSLIM UNIVERSITY</h2>
                <h4 style="margin:5px 0;">Session : 2026-27</h4>
                <h3 style="margin:0;">IQRA PUBLIC SCHOOL</h3>
                <p style="font-weight:bold; margin:5px 0;">Application Form for Admission</p>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div style="font-size:12px; line-height:1.8;">
                    <b>Application Number:</b> ${appNo}<br>
                    <b>Serial No of Admission:</b> ${d["Serial No. of Admission"] || 'N/A'}<br>
                    <b>Date of Admission:</b> ${d["Date of Admission"] || 'N/A'}
                </div>
                <div id="qrPrint"></div>
                <div style="width:100px; height:120px; border:1px solid #000; background:#eee; display:flex; align-items:center; justify-content:center;">
                    ${d["Photo of Student"] ? `<img src="${d["Photo of Student"]}" style="width:100%;height:100%; object-fit:cover;">` : '<span style="font-size:10px;">No Photo</span>'}
                </div>
            </div>

            <div class="section-bar">PERSONAL DETAILS</div>
            <table class="p-table">
                <tr><td class="sh">Student Name</td><td>${d['Name of Student'] || ''}</td><td class="sh">Father's Name</td><td>${d["Father's Name"] || ''}</td></tr>
                <tr><td class="sh">Mother's Name</td><td>${d["Mother's Name"] || ''}</td><td class="sh">Date of Birth</td><td>${d["Date of Birth"] || ''}</td></tr>
                <tr><td class="sh">Caste</td><td>${d["Caste"] || ''}</td><td class="sh">Category</td><td>${d["Category"] || ''}</td></tr>
                <tr><td class="sh">Aadhaar Number</td><td colspan="3">${d["Aadhaar Number"] || ''}</td></tr>
            </table>

            <div class="section-bar">CONTACT & ADDRESS</div>
            <table class="p-table">
                <tr><td class="sh">Mobile Number</td><td>${d["Mobile Number"] || ''}</td><td class="sh">Residence</td><td>${d["Residence"] || d["Residence"] || ''}</td></tr>
            </table>

            <div class="section-bar">ACADEMIC DETAILS</div>
            <table class="p-table">
                <tr><td class="sh">Previous School</td><td colspan="3">${d["Name & Place of Previous School"] || ''}</td></tr>
                <tr><td class="sh">Reading Class</td><td>${d["Class in which reading"] || ''}</td><td class="sh">TC No</td><td>${d["T.C No."] || ''}</td></tr>
                <tr><td class="sh">TC Date</td><td>${d["Date of T.C"] || ''}</td><td class="sh">Admitted Class</td><td>${d["Class in which admitted"] || ''}</td></tr>
                <tr><td class="sh">Leaving Date</td><td colspan="3">${d["Date of leaving the School"] || ''}</td></tr>
            </table>

            <div class="section-bar">BANK DETAILS</div>
            <table class="p-table">
                <tr><td class="sh">Account Holder</td><td>${d["Account Holder's Name"] || ''}</td><td class="sh">Bank Name</td><td>${d["Bank Name"] || ''}</td></tr>
                <tr><td class="sh">Account No</td><td>${d["Bank Account Number"] || ''}</td><td class="sh">IFSC Code</td><td>${d["IFSC"] || ''}</td></tr>
            </table>

            <div style="margin-top:40px; display:flex; justify-content:space-between; font-size:12px; text-align:center;">
                <div style="width:120px;">
                    ${d["Signature"] ? `<img src="${d["Signature"]}" style="width:100%; height:40px; object-fit:contain;">` : ''}
                    <br>_________________<br>Student Signature
                </div>
                <div><br><br>_________________<br>Guardian's Signature</div>
                <div><br><br>_________________<br>Principal's Signature</div>
            </div>
        `;
        if(appNo !== "N/A") {
            document.getElementById("qrPrint").innerHTML = "";
            new QRCode(document.getElementById("qrPrint"), { text: appNo, width: 60, height: 60 });
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
