<!DOCTYPE html>
<html>
<head>
    <title>Iqra School - 100% Dynamic Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #1a5d1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; border-top: 8px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .upload-box { border: 1px dashed #2e7d32; padding: 15px; margin-top: 20px; text-align: center; background: #f0fdf0; }
        #loader { text-align: center; font-size: 18px; color: var(--primary); padding: 50px; }
        button { background: var(--primary); color: white; padding: 15px; border: none; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--primary);">IQRA PUBLIC SCHOOL - ADMISSION</h2>
    <div id="loader">🔄 Google Sheet se dynamic fields load ho rahi hain...</div>

    <form id="admissionForm" style="display:none;">
        <div id="dynamicFields" class="form-grid"></div>

        <div class="upload-box">
            <label><b>Student Photo</b></label>
            <input type="file" id="pIn" accept="image/*" required>
            <br><br>
            <label><b>Student Signature</b></label>
            <input type="file" id="sIn" accept="image/*" required>
        </div>

        <button type="submit" id="subBtn">SUBMIT & DOWNLOAD PDF</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzy3G55vxP6bDx988N3NUV3FDF4uS8k89GpWzdY0L5pfXZ-ApysBxLHq8gqjSMmkZBu/exec'; // Apna URL yahan dalein
    let photoBase64 = "", sigBase64 = "";

    // 1. Dynamic Headers Fetching
    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            const headers = await res.json();
            const container = document.getElementById('dynamicFields');
            
            headers.forEach((headerObj) => {
                const hName = headerObj.name;
                // Photo, Signature aur S.No ko skip karein taaki duplicate na ho
                if(hName !== "Photo of Students" && hName !== "Signature" && hName.trim() !== "") {
                    container.innerHTML += `
                        <div class="form-group">
                            <label>Field ${headerObj.index}: ${hName}</label>
                            <input type="text" name="${hName}" placeholder="Enter ${hName}" required>
                        </div>`;
                }
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('admissionForm').style.display = 'block';
        } catch (e) {
            document.getElementById('loader').innerText = "Error: Sheet headers nahi mil paaye. Script URL check karein.";
        }
    };

    // 2. Base64 Converter for Images
    const toBase64 = file => new Promise((res, rej) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => res(reader.result);
        reader.onerror = error => rej(error);
    });

    // 3. Form Submission
    document.getElementById('admissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const pFile = document.getElementById('pIn').files[0];
        const sFile = document.getElementById('sIn').files[0];
        if(pFile) photoBase64 = await toBase64(pFile);
        if(sFile) sigBase64 = await toBase64(sFile);

        const formData = new FormData(e.target);
        const dataObj = Object.fromEntries(formData.entries());
        dataObj.photoData = photoBase64;
        dataObj.sigData = sigBase64;

        try {
            // Send to Sheet
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(dataObj), mode: 'no-cors' });
            
            // Generate PDF
            generatePDF(dataObj);
            alert("Admission Complete! PDF Downloaded.");
        } catch (err) {
            alert("Submission error!");
        }

        btn.innerText = "SUBMIT & DOWNLOAD PDF";
        btn.disabled = false;
    };

    function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("IQRA PUBLIC SCHOOL", 105, 15, {align: 'center'});
        
        if(photoBase64) doc.addImage(photoBase64, 'JPEG', 160, 10, 35, 40);

        const tableBody = Object.entries(data).filter(([k]) => !k.includes('Data')).map(([k,v]) => [k, v]);
        doc.autoTable({ startY: 50, body: tableBody, margin: {right: 55} });
        
        if(sigBase64) doc.addImage(sigBase64, 'JPEG', 150, doc.lastAutoTable.finalY + 10, 40, 15);
        doc.save("Admission.pdf");
    }
</script>
</body>
</html>
