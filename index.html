<!DOCTYPE html>
<html>
<head>
    <title>Iqra Public School - Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #444; }
        input { padding: 8px; border: 1px solid #bbb; border-radius: 3px; }
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; padding: 15px; border: 1px dashed #888; }
        .preview { width: 100px; height: 120px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .declaration-box { margin-top: 20px; padding: 15px; background: #fffde7; border: 1px solid #ffe58f; border-radius: 4px; font-size: 13px; line-height: 1.6; color: #333; }
        .agree-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; color: var(--p); }
        .btn-main { background: var(--p); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-body { background: white; width: 90%; max-width: 700px; margin: 20px auto; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .pre-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .pre-table td { border: 1px solid #ddd; padding: 6px; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px 0; font-size: 12px;">Mathurapur, Barsoi, Katihar-855102 | Session 2026-27</p>
    </div>

    <form id="admissionForm">
        <div id="dynamicFields" class="grid"></div>
        
        <div class="uploads">
            <div class="field">
                <label id="photoLabel">Photo</label>
                <input type="file" accept="image/*" onchange="upImg(this, 'p-pre')">
                <div id="p-pre" class="preview" style="margin-top:5px;">PHOTO</div>
            </div>
            <div class="field">
                <label id="sigLabel">Signature</label>
                <input type="file" accept="image/*" onchange="upImg(this, 's-pre')">
                <div id="s-pre" class="preview" style="margin-top:5px; width:180px; height:50px;">SIGNATURE</div>
            </div>
        </div>

        <div class="declaration-box">
            <b>DECLARATION:</b><br>
            1. I solemnly undertake to accept and abide by the rules of the school.<br>
            2. I hereby affirm that the entries made by me above are true to the best of my knowledge.<br>
            <label class="agree-row">
                <input type="checkbox" id="agreeCheck" onchange="document.getElementById('submitBtn').disabled = !this.checked">
                I agree to the above declaration.
            </label>
        </div>

        <button type="button" id="submitBtn" class="btn-main" onclick="openPre()" disabled>PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 style="text-align:center;">PREVIEW</h3>
        <div id="preContent"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="document.getElementById('modal').style.display='none'" style="flex:1; padding:10px;">Edit</button>
            <button id="fBtn" onclick="sendData()" style="flex:2; padding:10px; background:var(--p); color:white; border:none; cursor:pointer;">FINAL SUBMIT & PRINT</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwoPQTTMbHzNf9l6GrovN8vc7V8Ld0BWPyEQn2vVZqKDqjcUxXcP9gFb95ucxJa7Sl_/exec';
    let imgs = { p: "", s: "" };
    let globalHeaders = [];

    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            globalHeaders = await res.json();
            const div = document.getElementById('dynamicFields');
            let n = 1;
            globalHeaders.forEach(h => {
                const head = h.trim();
                if(head && !["Photo of Student", "Photo of Students", "Signature", "Application No"].includes(head)) {
                    let type = head.toLowerCase().includes('date') ? 'date' : 'text';
                    div.innerHTML += `<div class="field"><label>${n}. ${head}</label><input type="${type}" name="${head}"></div>`;
                    n++;
                }
            });
            document.getElementById('photoLabel').innerText = n + ". Student Photo";
            document.getElementById('sigLabel').innerText = (n + 1) + ". Signature";
        } catch(e) { console.log("Header Error"); }
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        if(i.files[0]) r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        const d = new FormData(document.getElementById('admissionForm'));
        let h = '<table class="pre-table">';
        d.forEach((v, k) => { h += `<tr><td><b>${k}</b></td><td>${v||'N/A'}</td></tr>`; });
        document.getElementById('preContent').innerHTML = h + '</table>';
        document.getElementById('modal').style.display = 'block';
    }

    async function sendData() {
        const b = document.getElementById('fBtn'); b.innerText = "Processing..."; b.disabled = true;
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        d.photoData = imgs.p; d.sigData = imgs.s;
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(d) });
            const r = await res.json();
            if(r.status === "Success") {
                d.FinalAppNo = r.appNo;
                printAMU(d);
                alert("Success! ID: " + d.FinalAppNo);
                location.reload();
            }
        } catch(e) { alert("Error!"); b.disabled = false; }
    }

    function printAMU(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        doc.rect(5, 5, 200, 287);
        
        // Header Details
        doc.setFontSize(8); doc.setFont("helvetica", "bold");
        doc.text("Application Number: " + (data.FinalAppNo || ""), 10, 12);
        doc.text("Serial No of Admission: " + (data["Serial no. of Admission"] || ""), 10, 16);
        doc.text("Date of Admission: " + (data["Date of Admission"] || ""), 10, 20);

        doc.setFontSize(13); doc.setTextColor(150, 0, 0);
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("Session : 2026-27", 105, 20, {align:'center'});
        doc.text("Application Form for admission to Class IX", 105, 25, {align:'center'});
        doc.text("IQRA PUBLIC SCHOOL", 105, 30, {align:'center'});

        if(imgs.p) { doc.addImage(imgs.p, 'JPEG', 165, 10, 30, 38); doc.rect(165, 10, 30, 38); }

        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: String(data.FinalAppNo), width: 100, height: 100 });
        
        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 92, 35, 20, 20); 

            let y = 62;
            const groups = [
                { t: "Personal Details", k: ["Name of Student", "Father's Name", "Mother's Name", "Date of Birth", "Caste", "Category"] },
                { t: "Contact & Address", k: ["Mobile Number", "Permanent Residence"] },
                { t: "Academic Details", k: ["Name & Place of Previous School", "Class in which reading"] },
                { t: "Bank Details", k: ["Bank Name", "Bank Account Number", "IFSC", "Account Holder's Name"] }
            ];

            doc.setFontSize(8);
            groups.forEach(g => {
                doc.setFillColor(240, 240, 240); doc.rect(10, y, 190, 5, 'F');
                doc.setFont("helvetica", "bold"); doc.text(g.t.toUpperCase(), 12, y + 3.8);
                y += 6;

                // GRID/TABLE FORM (Two Columns)
                for (let i = 0; i < g.k.length; i += 2) {
                    let k1 = g.k[i], k2 = g.k[i+1];
                    // Col 1
                    doc.setFont("helvetica", "bold"); doc.text(k1 + ":", 12, y);
                    doc.setFont("helvetica", "normal"); doc.text(String(data[k1] || "N/A"), 45, y);
                    // Col 2
                    if(k2) {
                        doc.setFont("helvetica", "bold"); doc.text(k2 + ":", 105, y);
                        doc.setFont("helvetica", "normal"); doc.text(String(data[k2] || "N/A"), 140, y);
                    }
                    doc.setDrawColor(200); doc.line(10, y+1.5, 200, y+1.5);
                    y += 6.5;
                }
                y += 2;
            });

            // Additional Info in Grid
            let usedK = groups.flatMap(g => g.k).concat(["Photo of Student", "Signature", "Application No", "Serial no. of Admission", "Date of Admission"]);
            let extraK = globalHeaders.filter(h => !usedK.includes(h.trim()) && h.trim() !== "");
            if(extraK.length > 0) {
                doc.setFillColor(245, 245, 245); doc.rect(10, y, 190, 5, 'F');
                doc.setFont("helvetica", "bold"); doc.text("OTHER INFORMATION", 12, y + 3.8); y += 6;
                for (let i = 0; i < extraK.length; i += 2) {
                    let k1 = extraK[i], k2 = extraK[i+1];
                    doc.setFont("helvetica", "bold"); doc.text(k1.trim() + ":", 12, y);
                    doc.setFont("helvetica", "normal"); doc.text(String(data[k1.trim()] || "N/A"), 45, y);
                    if(k2) {
                        doc.setFont("helvetica", "bold"); doc.text(k2.trim() + ":", 105, y);
                        doc.setFont("helvetica", "normal"); doc.text(String(data[k2.trim()] || "N/A"), 140, y);
                    }
                    doc.line(10, y+1.5, 200, y+1.5); y += 6.5;
                }
            }

            // Declaration & Signatures
            y = 262;
            doc.setFontSize(7); doc.setFont("helvetica", "bold"); doc.text("DECLARATION:", 10, y);
            doc.setFont("helvetica", "normal");
            doc.text("I solemnly undertake to accept and abide by the rules of the school. I hereby affirm that the entries made above are true to the best of my knowledge.", 10, y + 3);

            y = 280;
            if(imgs.s) doc.addImage(imgs.s, 'JPEG', 10, y-10, 25, 7);
            doc.line(10, y, 55, y); doc.text("Student Signature", 15, y + 3.5);
            doc.line(77, y, 122, y); doc.text("Guardian's Signature", 82, y + 3.5);
            doc.line(145, y, 190, y); doc.text("Principal's Signature", 150, y + 3.5);

            doc.save("Admission_" + (data["Name of Student"] || "Form") + ".pdf");
        }, 600);
    }
</script>
</body>
</html>
