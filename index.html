<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Interface: Wahi Purana Simple Style */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #444; }
        input { padding: 10px; border: 1px solid #bbb; border-radius: 4px; }
        
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; padding: 15px; border: 1px dashed #888; }
        .preview-img { width: 100px; height: 120px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .agree-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 15px; font-weight: bold; color: var(--p); cursor: pointer; }
        .btn-main { background: var(--p); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 10px 0; }
        .pdf-page-preview { background: white; width: 95%; max-width: 800px; margin: 0 auto; padding: 25px; box-sizing: border-box; }
        
        /* PDF Preview Table (Grouped Layout) */
        .group-head { background: #eee; font-weight: bold; padding: 5px; border: 1px solid #ccc; text-transform: uppercase; font-size: 11px; margin-top: 10px; }
        .info-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 5px; }
        .info-table td { border: 1px solid #ccc; padding: 6px; width: 25%; }
        .label-cell { background: #f4f4f4; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px 0; font-size: 12px;">Mathurapur, Barsoi, Katihar-855102 | Session 2026-27</p>
    </div>
    
    <form id="admissionForm">
        <div id="dynamicFields" class="grid"></div> <div class="uploads">
            <div class="field"><label>Student Photo</label><input type="file" accept="image/*" onchange="upImg(this, 'p-pre')"><div id="p-pre" class="preview-img">PHOTO</div></div>
            <div class="field"><label>Signature</label><input type="file" accept="image/*" onchange="upImg(this, 's-pre')"><div id="s-pre" class="preview-img" style="width:180px;height:50px;">SIGNATURE</div></div>
        </div>

        <div style="font-size: 12px;">
            <b>DECLARATION:</b> I solemnly undertake to accept and abide by the rules of the school.
            <label class="agree-row"><input type="checkbox" onchange="document.getElementById('submitBtn').disabled = !this.checked"> I agree to the declaration.</label>
        </div>
        
        <button type="button" id="submitBtn" class="btn-main" onclick="openPre()" disabled style="margin-top:20px;">PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div id="pdfContent" class="pdf-page-preview"></div>
    <div style="text-align: center; margin-top: 20px; padding-bottom: 40px;">
        <button id="fBtn" onclick="sendData()" style="padding:15px; background:#1a5d1a; color:white; border:none; width:80%; font-weight:bold; cursor:pointer; border-radius:4px;">FINAL SUBMIT</button>
        <button id="pBtn" style="display:none; padding:12px 30px; background:#008000; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;" onclick="triggerIframePrint()">PRINT / SAVE PDF</button>
        <button onclick="location.reload()" style="padding:10px 20px; background:#666; color:white; border:none; margin-left:10px; cursor:pointer; border-radius:4px;">BACK</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';
    let imgs = { p: "", s: "" }, finalDoc = null;

    // Interface: Simple List jaisa pehle tha
    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            const headers = await res.json();
            const div = document.getElementById('dynamicFields');
            const skip = ["Photo of Student", "Signature", "Application No", "Serial No. of Admission", "Date of Admission"];
            headers.forEach((h, i) => {
                if(h && !skip.includes(h.trim())) {
                    div.innerHTML += `<div class="field"><label>${i+1}. ${h.trim()}</label><input type="${h.includes('Date')?'date':'text'}" name="${h.trim()}"></div>`;
                }
            });
        } catch(e) {}
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        if(i.files[0]) r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        renderDigitalPreview();
        document.getElementById('modal').style.display = 'block';
    }

    // PDF Preview: Grouped Layout (Permanent Residence fixed)
    function renderDigitalPreview(extra = {}) {
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        let html = `
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #000; padding-bottom:10px;">
                <div style="font-size:9px;">App No: ${extra.appNo || '...'} | Serial: ${extra.sNo || '...'}</div>
                <div style="text-align:center;">
                    <h3 style="margin:0; color:#960000; font-size:16px;">ALIGARH MUSLIM UNIVERSITY</h3>
                    <p style="margin:2px 0; font-size:10px;">Session 2026-27 | <b>IQRA PUBLIC SCHOOL</b></p>
                    <div id="qrArea" style="display:flex; justify-content:center; margin-top:5px;"></div>
                </div>
                <div style="width:75px; height:85px; border:1px solid #000;">${imgs.p ? `<img src="${imgs.p}" style="width:100%; height:100%;">` : ''}</div>
            </div>
            
            <div class="group-head">Personal Details</div>
            <table class="info-table">
                <tr><td class="label-cell">Student Name</td><td>${d['Name of Student'] || ''}</td><td class="label-cell">Father's Name</td><td>${d["Father's Name"] || ''}</td></tr>
                <tr><td class="label-cell">Mother's Name</td><td>${d["Mother's Name"] || ''}</td><td class="label-cell">Date of Birth</td><td>${d["Date of Birth"] || ''}</td></tr>
                <tr><td class="label-cell">Caste</td><td>${d["Caste"] || ''}</td><td class="label-cell">Category</td><td>${d["Category"] || ''}</td></tr>
            </table>

            <div class="group-head">Contact & Address</div>
            <table class="info-table">
                <tr><td class="label-cell">Mobile Number</td><td>${d["Mobile Number"] || ''}</td><td class="label-cell">Permanent Residence</td><td>${d["Permanent Residence"] || ''}</td></tr>
            </table>

            <div class="group-head">Bank Details</div>
            <table class="info-table">
                <tr><td class="label-cell">Bank Name</td><td>${d["Bank Name"] || ''}</td><td class="label-cell">Account No</td><td>${d["Bank Account Number"] || ''}</td></tr>
                <tr><td class="label-cell">IFSC Code</td><td>${d["IFSC"] || ''}</td><td class="label-cell">Holder Name</td><td>${d["Account Holder's Name"] || ''}</td></tr>
            </table>

            <div style="margin-top:40px; display:flex; justify-content:space-between; font-size:10px; text-align:center;">
                <div>${imgs.s ? `<img src="${imgs.s}" style="width:80px;height:25px;"><br>` : ''} ________________<br>Student Signature</div>
                <div>________________<br>Guardian Signature</div>
                <div>________________<br>Principal Signature</div>
            </div>
        `;
        document.getElementById('pdfContent').innerHTML = html;
        if(extra.appNo) new QRCode(document.getElementById("qrArea"), { text: extra.appNo, width: 45, height: 45 });
    }

    async function sendData() {
        const b = document.getElementById('fBtn');
        b.innerText = "SAVING..."; b.disabled = true;
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        d.photoData = imgs.p; d.sigData = imgs.s;
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(d) });
            const r = await res.json();
            if(r.status === "Success") {
                renderDigitalPreview({appNo: r.appNo, sNo: r.sNo});
                b.style.display = "none";
                document.getElementById('pBtn').style.display = "inline-block";
                
                // Final PDF Build (Chrome compatible)
                const { jsPDF } = window.jspdf;
                finalDoc = new jsPDF('p', 'mm', 'a4');
                finalDoc.text(`ADMISSION FORM: ${r.appNo}`, 105, 20, {align:'center'});
                // ... (Yahan baki PDF drawing code)
            }
        } catch(e) { b.disabled = false; b.innerText = "FINAL SUBMIT"; }
    }

    function triggerIframePrint() {
        if(!finalDoc) return;
        const pdfData = finalDoc.output('datauristring');
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = pdfData;
        document.body.appendChild(iframe);
        iframe.onload = () => { iframe.contentWindow.print(); };
    }
</script>
</body>
</html>
