<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IQRA Public School - Admission Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --border: #333; }
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Header Style */
        .header { text-align: center; border-bottom: 2px solid var(--p); margin-bottom: 20px; padding-bottom: 10px; }
        .search-section { display: flex; gap: 10px; background: #f9f9f9; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        
        /* AMU Grid Layout */
        .amu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; border: 1px solid #ccc; padding: 20px; position: relative; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 3px; }
        input { padding: 8px; border: 1px solid #999; border-radius: 2px; font-size: 13px; }
        
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; border: 1px dashed #aaa; padding: 15px; }
        .preview-box { width: 110px; height: 130px; border: 1px solid #444; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Modal Preview */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 800px; margin: 20px auto; padding: 20px; border-radius: 5px; }

        .btn { padding: 12px 25px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; }
        .btn-green { background: var(--p); color: white; width: 100%; margin-top: 15px; }
        .btn-gold { background: #d4af37; color: #000; }
        .instruction-box { font-size: 12px; color: #d32f2f; border: 1px solid #fbc02d; background: #fffde7; padding: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px;">Mathurapur, Barsoi, Katihar-855102 | Admission 2026-27</p>
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Enter App No to Download Result" style="flex:1;">
        <button class="btn btn-gold" onclick="searchData()">SEARCH</button>
    </div>

    <form id="regForm">
        <div id="loader">🔄 Loading Form Fields...</div>
        
        <div id="fieldsContainer" class="amu-grid" style="display:none;">
            </div>

        <div class="upload-row">
            <div>
                <label>1. STUDENT PHOTO</label>
                <input type="file" accept="image/*" onchange="readImg(this, 'pImg')">
                <div id="pImg" class="preview-box" style="margin-top:5px;">PHOTO</div>
            </div>
            <div>
                <label>2. SIGNATURE</label>
                <input type="file" accept="image/*" onchange="readImg(this, 'sImg')">
                <div id="sImg" class="preview-box" style="margin-top:5px; height:50px; width:180px;">SIGNATURE</div>
            </div>
        </div>

        <button type="button" class="btn btn-green" onclick="showPreview()">PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="previewModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:var(--p);">APPLICATION PREVIEW</h3>
        <hr>
        <div id="previewData" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px;"></div>
        <div class="instruction-box">
            * Check all details carefully. Once submitted, you can download the final PDF.
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:#888; color:white; flex:1;" onclick="closeModal()">EDIT DATA</button>
            <button class="btn btn-green" id="finalSubBtn" style="flex:2;" onclick="finalSubmit()">CONFIRM & PRINT PDF</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxqfYLSn70aFyPW7CtH0uXe5VSawo3Karj-n0ayXQOsTKq88YEuzTvklJOl5Poj5Kqx/exec';
    let imgStore = { p: "", s: "" };
    let globalHeaders = [];

    // Load Fields
    window.onload = async () => {
        const res = await fetch(scriptURL);
        globalHeaders = await res.json();
        const container = document.getElementById('fieldsContainer');
        let counter = 3;

        globalHeaders.forEach(h => {
            const head = h.trim();
            const skip = ["Photo of Students", "Signature", "Application No", "S.No"];
            if(head && !skip.includes(head)) {
                let type = head.toLowerCase().includes("date") ? "date" : "text";
                container.innerHTML += `
                    <div class="field">
                        <label>${counter}. ${head}</label>
                        <input type="${type}" name="${head}">
                    </div>`;
                counter++;
            }
        });
        document.getElementById('loader').style.display = 'none';
        container.style.display = 'grid';
    };

    function readImg(input, id) {
        const fr = new FileReader();
        fr.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'pImg') imgStore.p = e.target.result; else imgStore.s = e.target.result;
        };
        fr.readAsDataURL(input.files[0]);
    }

    function showPreview() {
        const form = document.getElementById('regForm');
        const data = Object.fromEntries(new FormData(form));
        let html = "";
        for (let [key, value] of Object.entries(data)) {
            html += `<div><strong>${key}:</strong> ${value || 'N/A'}</div>`;
        }
        document.getElementById('previewData').innerHTML = html;
        document.getElementById('previewModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('previewModal').style.display = 'none'; }

    async function finalSubmit() {
        const btn = document.getElementById('finalSubBtn');
        btn.innerText = "Submitting..."; btn.disabled = true;
        
        const data = Object.fromEntries(new FormData(document.getElementById('regForm')));
        data.photoData = imgStore.p;
        data.sigData = imgStore.s;

        const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
        const result = await res.json();
        
        if(result.status === "Success") {
            data.AppNo = result.appNo;
            generatePDF(data);
            alert("Application Submitted! No: " + result.appNo);
            location.reload();
        }
    }

    function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.rect(5, 5, 200, 287);
        doc.setFontSize(20); doc.setTextColor(26, 93, 26);
        doc.text("IQRA PUBLIC SCHOOL", 105, 20, {align:'center'});
        if(imgStore.p) doc.addImage(imgStore.p, 'JPEG', 160, 30, 35, 40);
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("Application No: " + data.AppNo, 15, 35);
        
        const rows = Object.entries(data).filter(([k])=>!k.includes('Data')).map(([k,v])=>[k.toUpperCase(), v || "N/A"]);
        doc.autoTable({ startY: 75, body: rows, theme: 'grid' });
        
        if(imgStore.s) doc.addImage(imgStore.s, 'JPEG', 150, doc.lastAutoTable.finalY + 10, 40, 15);
        doc.save(data.AppNo + ".pdf");
    }

    async function searchData() {
        const id = document.getElementById('searchInput').value;
        const res = await fetch(scriptURL + "?search=" + id);
        const result = await res.json();
        if(result === "Not Found") alert("Record not found!");
        else alert("Record Found for: " + result[3]); // Adjust index as per sheet
    }
</script>
</body>
</html>
