<!DOCTYPE html>
<html>
<head>
    <title>IPS - Search Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 20px; text-align: center; }
        .box { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .highlight { background: #d4af37; color: white; padding: 8px; font-weight: bold; margin: 15px 0; border-radius: 4px; display: inline-block; width: 90%; }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 12px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
    <p style="font-size:13px; margin:5px 0;">Mathurapur, Barsoi, Katihar</p>
    <div class="highlight">ADMISSION FORM</div>

    <div class="input-group">
        <label>Student Name</label>
        <input type="text" id="sName" placeholder="Enter full name">
    </div>
    <div class="input-group">
        <label>Date of Birth</label>
        <input type="date" id="sDob">
    </div>
    <div style="margin:10px 0; color:#888; font-size:12px;">— OR —</div>
    <div class="input-group">
        <label>Aadhaar Number</label>
        <input type="number" id="sAadhar" placeholder="12 digit Aadhaar">
    </div>

    <button class="btn" onclick="search()">SEARCH & DOWNLOAD PDF</button>
    <p id="msg" style="display:none; color:var(--p);">Searching...</p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwoPQTTMbHzNf9l6GrovN8vc7V8Ld0BWPyEQn2vVZqKDqjcUxXcP9gFb95ucxJa7Sl_/exec';

    async function search() {
        const name = document.getElementById('sName').value;
        const dob = document.getElementById('sDob').value;
        const aadhar = document.getElementById('sAadhar').value;
        const msg = document.getElementById('msg');

        if(!name || (!dob && !aadhar)) return alert("Please fill Name and either DOB or Aadhaar");

        msg.style.display = "block";
        const res = await fetch(`${scriptURL}?searchName=${encodeURIComponent(name)}&searchDOB=${dob}&searchAadhar=${aadhar}`);
        const data = await res.json();
        msg.style.display = "none";

        if(data === "Not Found") alert("Record not found!"); else printPDF(data);
    }

    function printPDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // Header & Design
        doc.rect(5, 5, 200, 287);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.setTextColor(150, 0, 0); 
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("IQRA PUBLIC SCHOOL", 105, 30, {align:'center'});

        // Photo (Using new column name "Photo of Student")
        if(data["Photo of Student"]) {
            doc.addImage(data["Photo of Student"], 'JPEG', 160, 10, 35, 42);
            doc.rect(160, 10, 35, 42);
        }

        // QR Code
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: String(data["Serial No. of Admission"]), width: 100, height: 100 });

        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 90, 35, 25, 25);

            let y = 70;
            // Aapki sheet ke exact headers ke mutabiq mapping
            const groups = [
                { t: "Personal Details", k: ["Name of Student", "Father's Name", "Mother's Name", "Date of Birth", "Caste", "Category", "Aadhaar Number"] },
                { t: "Contact & Address", k: ["Mobile Number", "Permanent Residence"] },
                { t: "Academic Details", k: ["Name & Place of Previous School", "Class in which reading", "Class in which admitted"] }
            ];

            groups.forEach(g => {
                doc.setFillColor(240, 240, 240); doc.rect(10, y, 190, 6, 'F');
                doc.setFontSize(9); doc.text(g.t.toUpperCase(), 12, y + 4.5);
                y += 10;
                g.k.forEach(key => {
                    doc.setFont("helvetica", "bold"); doc.text(key + ":", 12, y);
                    doc.setFont("helvetica", "normal"); doc.text(String(data[key] || "N/A"), 75, y);
                    doc.line(10, y+1.5, 200, y+1.5); y += 8;
                });
                y += 5;
            });

            // Signature
            if(data["Signature"]) doc.addImage(data["Signature"], 'JPEG', 160, 268, 30, 10);
            doc.text("Student Signature", 165, 284);
            doc.save("Admission_" + data["Name of Student"] + ".pdf");
        }, 500);
    }
</script>
</body>
</html>
