<!DOCTYPE html>
<html>
<head>
    <title>Iqra Public School - Dynamic Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #444; }
        input { padding: 8px; border: 1px solid #bbb; border-radius: 3px; font-size: 14px; }
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; padding: 15px; border: 1px dashed #888; }
        .preview { width: 100px; height: 120px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; font-size: 10px; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-main { background: var(--p); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-body { background: white; width: 90%; max-width: 700px; margin: 20px auto; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .pre-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .pre-table td { border: 1px solid #ddd; padding: 6px; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px 0; font-size: 12px;">Mathurapur, Barsoi, Katihar | Admission Form</p>
    </div>

    <form id="admissionForm">
        <div id="dynamicFields" class="grid"></div>
        
        <div class="uploads">
            <div class="field">
                <label>Student Photo</label>
                <input type="file" accept="image/*" onchange="upImg(this, 'p-pre')">
                <div id="p-pre" class="preview" style="margin-top:5px;">PHOTO</div>
            </div>
            <div class="field">
                <label>Signature</label>
                <input type="file" accept="image/*" onchange="upImg(this, 's-pre')">
                <div id="s-pre" class="preview" style="margin-top:5px; width:150px; height:50px;">SIGNATURE</div>
            </div>
        </div>

        <button type="button" class="btn-main" onclick="openPre()">PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 style="text-align:center;">CONFIRM DETAILS</h3>
        <div id="preContent"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="document.getElementById('modal').style.display='none'" style="flex:1; padding:10px;">Edit</button>
            <button id="fBtn" onclick="sendData()" style="flex:2; padding:10px; background:var(--p); color:white; border:none;">FINAL SUBMIT</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwoPQTTMbHzNf9l6GrovN8vc7V8Ld0BWPyEQn2vVZqKDqjcUxXcP9gFb95ucxJa7Sl_/exec';
    let imgs = { p: "", s: "" };
    let allHeaders = [];

    // 1. Dynamic Form Generation
    window.onload = async () => {
        const res = await fetch(scriptURL);
        allHeaders = await res.json();
        const div = document.getElementById('dynamicFields');
        
        allHeaders.forEach((h, index) => {
            const head = h.trim();
            // System columns jinhe user manually nahi bharega
            const skip = ["Photo of Student", "Signature", "Serial No. of Admission", "Date of Admission", "Application No"];
            
            if(head && !skip.includes(head)) {
                let type = head.toLowerCase().includes('date') ? "date" : "text";
                if(head.toLowerCase().includes('number') || head.toLowerCase().includes('adhar')) type = "number";
                
                div.innerHTML += `
                    <div class="field">
                        <label>${index + 1}. ${head}</label>
                        <input type="${type}" name="${head}" required>
                    </div>`;
            }
        });
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        if(i.files[0]) r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        const d = new FormData(document.getElementById('admissionForm'));
        let h = '<table class="pre-table">';
        d.forEach((v, k) => { h += `<tr><td><b>${k}</b></td><td>${v || 'N/A'}</td></tr>`; });
        document.getElementById('preContent').innerHTML = h + '</table>';
        document.getElementById('modal').style.display = 'block';
    }

    // 2. Data Submission
    async function sendData() {
        const b = document.getElementById('fBtn'); 
        b.innerText = "Saving..."; b.disabled = true;
        
        const formData = new FormData(document.getElementById('admissionForm'));
        const dataObj = Object.fromEntries(formData);
        dataObj.photoData = imgs.p; 
        dataObj.sigData = imgs.s;

        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(dataObj) });
            const r = await res.json();
            
            if(r.status === "Success") {
                // PDF ke liye system data add karna
                dataObj["Serial No. of Admission"] = r.sNo;
                dataObj["Date of Admission"] = new Date().toLocaleDateString('en-GB');
                dataObj["Photo of Student"] = imgs.p;
                dataObj["Signature"] = imgs.s;
                
                printDynamicPDF(dataObj);
                alert("Success! Serial No: " + r.sNo);
                location.reload();
            }
        } catch(e) { alert("Error!"); b.disabled = false; }
    }

    // 3. 100% Dynamic PDF Generator
    function printDynamicPDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // Border & Header
        doc.rect(5, 5, 200, 287);
        doc.setFont("helvetica", "bold");
        doc.text("IQRA PUBLIC SCHOOL", 105, 15, {align:'center'});
        doc.setFontSize(10);
        doc.text("Admission Confirmation Receipt", 105, 22, {align:'center'});

        // Photo
        if(data["Photo of Student"]) {
            doc.addImage(data["Photo of Student"], 'JPEG', 165, 10, 30, 35);
            doc.rect(165, 10, 30, 35);
        }

        // QR Code
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: String(data["Serial No. of Admission"]), width: 100, height: 100 });

        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 10, 10, 25, 25);

            // Dynamic Row Generator (Sare columns print honge)
            let y = 50;
            doc.setFontSize(9);
            
            allHeaders.forEach(head => {
                const h = head.trim();
                if(h && h !== "Signature" && h !== "Photo of Student") {
                    doc.setFont("helvetica", "bold");
                    doc.text(h + ":", 15, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(String(data[h] || "—"), 80, y);
                    doc.line(15, y + 1, 195, y + 1);
                    y += 8;
                    
                    // Page Break Handle
                    if(y > 270) { doc.addPage(); doc.rect(5, 5, 200, 287); y = 20; }
                }
            });

            // Signature
            if(data["Signature"]) {
                doc.addImage(data["Signature"], 'JPEG', 160, y + 5, 30, 10);
            }
            doc.text("Student Signature", 160, y + 20);
            
            doc.save("Admission_" + (data["Name of Student"] || "Form") + ".pdf");
        }, 600);
    }
</script>
</body>
</html>
