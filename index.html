<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .box { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        
        /* Interface Styles */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 3px; color: #333; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; padding: 10px; border: 1px dashed #aaa; }
        .preview-img { width: 80px; height: 100px; border: 1px solid #000; margin-top: 5px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { background: var(--p); color: white; padding: 12px; border: none; width: 100%; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 15px; }
        
        /* Result Preview Styles (Screenshot 2 Style) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .result-card { background: white; width: 95%; max-width: 700px; margin: 20px auto; padding: 15px; border: 1px solid #000; box-sizing: border-box; }
        .res-header { text-align: center; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        
        .info-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px; }
        .info-table td { border: 1px solid #ddd; padding: 4px 8px; }
        .label-cell { background: #f9f9f9; font-weight: bold; width: 25%; }
        .val-cell { width: 25%; }
        .group-header { background: #eee; font-weight: bold; padding: 4px; border: 1px solid #ddd; text-transform: uppercase; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <div style="text-align:center; border-bottom: 2px solid var(--p); padding-bottom:10px; margin-bottom:15px;">
        <h2 style="margin:0; color:var(--p);">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:2px 0; font-size:11px;">Mathurapur, Barsoi, Katihar-855102 | Session 2026-27</p>
    </div>
    
    <form id="admissionForm">
        <div id="dynamicFields" class="grid"></div> <div class="uploads">
            <div class="field"><label>Student Photo</label><input type="file" accept="image/*" onchange="upImg(this, 'p-pre')"><div id="p-pre" class="preview-img">PHOTO</div></div>
            <div class="field"><label>Signature</label><input type="file" accept="image/*" onchange="upImg(this, 's-pre')"><div id="s-pre" class="preview-img" style="width:140px;height:40px;">SIGNATURE</div></div>
        </div>

        <div style="font-size: 11px; margin-top:10px;">
            <label><input type="checkbox" onchange="document.getElementById('submitBtn').disabled = !this.checked"> I agree to the declaration.</label>
        </div>
        
        <button type="button" id="submitBtn" class="btn-main" onclick="openPre()" disabled>PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div id="pdfContent" class="result-card"></div>
    <div style="text-align: center; padding: 20px;">
        <button id="fBtn" onclick="sendData()" style="padding:12px 40px; background:#1a5d1a; color:white; border:none; font-weight:bold; cursor:pointer; border-radius:4px;">FINAL SUBMIT</button>
        <button id="pBtn" style="display:none; padding:12px 40px; background:#008000; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:4px;" onclick="triggerIframePrint()">PRINT / SAVE PDF</button>
        <button onclick="location.reload()" style="padding:10px 20px; background:#666; color:white; border:none; margin-left:10px; cursor:pointer; border-radius:4px;">BACK</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';
    let imgs = { p: "", s: "" }, finalDoc = null;

    // Correct Numbering Start from 1
    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            const headers = await res.json();
            const div = document.getElementById('dynamicFields');
            const skip = ["Photo of Student", "Signature", "Application No", "Serial No. of Admission", "Date of Admission"];
            
            let count = 1;
            headers.forEach((h) => {
                let cleanH = h.trim();
                if(cleanH && !skip.includes(cleanH)) {
                    div.innerHTML += `<div class="field"><label>${count}. ${cleanH}</label><input type="${cleanH.includes('Date')?'date':'text'}" name="${cleanH}"></div>`;
                    count++;
                }
            });
        } catch(e) {}
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        if(i.files[0]) r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        renderResultPreview();
        document.getElementById('modal').style.display = 'block';
    }

    // Result Style (Mapping Screenshot 2 & Screenshot 1 fields)
    function renderResultPreview(extra = {}) {
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        let html = `
            <div class="res-header">
                <img src="https://via.placeholder.com/40" style="float:left; margin-top:5px;"> <h3 style="margin:0; color:#000;">Iqra Public School</h3>
                <p style="margin:2px 0; font-size:10px;">Mathurapur, Barsoi, Katihar - 855102</p>
                <p style="margin:2px 0; font-size:10px; border-bottom:1px solid #000; display:inline-block; padding:0 10px;">ADMISSION FORM - 2026</p>
            </div>
            
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <div style="font-size:10px; line-height:1.5;">
                    <b>Application No:</b> ${extra.appNo || 'PENDING'}<br>
                    <b>Serial No:</b> ${extra.sNo || 'PENDING'}<br>
                    <b>Date:</b> ${new Date().toLocaleDateString('en-GB')}
                </div>
                <div style="text-align:center;">
                   <div id="qrArea"></div>
                </div>
                <div style="width:70px; height:85px; border:1px solid #000;">${imgs.p ? `<img src="${imgs.p}" style="width:100%; height:100%;">` : ''}</div>
            </div>

            <div class="group-header">Personal Details</div>
            <table class="info-table">
                <tr><td class="label-cell">Student Name</td><td class="val-cell">${d['Name of Student'] || ''}</td><td class="label-cell">Father's Name</td><td class="val-cell">${d["Father's Name"] || ''}</td></tr>
                <tr><td class="label-cell">Mother's Name</td><td>${d["Mother's Name"] || ''}</td><td class="label-cell">Date of Birth</td><td>${d["Date of Birth"] || ''}</td></tr>
                <tr><td class="label-cell">Caste</td><td>${d["Caste"] || ''}</td><td class="label-cell">Category</td><td>${d["Category"] || ''}</td></tr>
            </table>

            <div class="group-header">Contact & Address</div>
            <table class="info-table">
                <tr><td class="label-cell">Mobile Number</td><td>${d["Mobile Number"] || ''}</td><td class="label-cell">Permanent Residence</td><td>${d["Permanent Residence"] || ''}</td></tr>
            </table>

            <div class="group-header">Bank Details</div>
            <table class="info-table">
                <tr><td class="label-cell">Bank Name</td><td>${d["Bank Name"] || ''}</td><td class="label-cell">Account Number</td><td>${d["Bank Account Number"] || ''}</td></tr>
                <tr><td class="label-cell">IFSC Code</td><td>${d["IFSC"] || ''}</td><td class="label-cell">Holder Name</td><td>${d["Account Holder's Name"] || ''}</td></tr>
            </table>

            <div style="margin-top:30px; display:flex; justify-content:space-between; font-size:9px; text-align:center;">
                <div>${imgs.s ? `<img src="${imgs.s}" style="width:80px;height:25px;"><br>` : ''} ________________<br>Student Signature</div>
                <div>________________<br>Guardian Signature</div>
                <div>________________<br>Principal Signature</div>
            </div>
        `;
        document.getElementById('pdfContent').innerHTML = html;
        if(extra.appNo) new QRCode(document.getElementById("qrArea"), { text: extra.appNo, width: 45, height: 45 });
    }

    async function sendData() {
        const b = document.getElementById('fBtn');
        b.innerText = "PROCESSING..."; b.disabled = true;
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        d.photoData = imgs.p; d.sigData = imgs.s;
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(d) });
            const r = await res.json();
            if(r.status === "Success") {
                renderResultPreview({appNo: r.appNo, sNo: r.sNo});
                b.style.display = "none";
                document.getElementById('pBtn').style.display = "inline-block";
                
                // Final PDF Generation
                const { jsPDF } = window.jspdf;
                finalDoc = new jsPDF('p', 'mm', 'a4');
                finalDoc.text("ADMISSION FORM - IQRA PUBLIC SCHOOL", 105, 15, {align:'center'});
            }
        } catch(e) { b.innerText = "FINAL SUBMIT"; b.disabled = false; }
    }

    function triggerIframePrint() {
        if(!finalDoc) return;
        const pdfData = finalDoc.output('datauristring');
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none'; iframe.src = pdfData;
        document.body.appendChild(iframe);
        iframe.onload = () => { iframe.contentWindow.print(); };
    }
</script>
</body>
</html>
