<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqra Public School - Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Restore Grid & Grouping System */
        .section-title { background: #eee; padding: 5px 10px; font-weight: bold; font-size: 13px; margin: 15px 0 10px 0; border-left: 4px solid var(--p); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 3px; color: #444; }
        input { padding: 8px; border: 1px solid #bbb; border-radius: 4px; font-size: 13px; }
        
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; padding: 15px; border: 1px dashed #888; }
        .preview-img { width: 100px; height: 120px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Declaration Original Style */
        .declaration-box { margin-top: 20px; font-size: 12px; color: #333; }
        .agree-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-weight: bold; color: var(--p); }
        
        .btn-main { background: var(--p); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 4px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 10px 0; }
        .pdf-page-preview { background: white; width: 95%; max-width: 800px; margin: 0 auto; padding: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; }
        
        /* PDF Table Restored */
        .info-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 15px; }
        .info-table td { border: 1px solid #ccc; padding: 5px 8px; width: 25%; }
        .info-table .label-cell { background: #f9f9f9; font-weight: bold; width: 25%; }
        .group-head { background: #f0f0f0; font-weight: bold; padding: 5px; border: 1px solid #ccc; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px 0; font-size: 12px;">Mathurapur, Barsoi, Katihar-855102 | Session 2026-27</p>
    </div>
    
    <form id="admissionForm">
        <div id="dynamicFields"></div> <div class="uploads">
            <div class="field"><label id="photoLabel">Student Photo</label><input type="file" accept="image/*" onchange="upImg(this, 'p-pre')"><div id="p-pre" class="preview-img">PHOTO</div></div>
            <div class="field"><label id="sigLabel">Signature</label><input type="file" accept="image/*" onchange="upImg(this, 's-pre')"><div id="s-pre" class="preview-img" style="width:180px;height:50px;">SIGNATURE</div></div>
        </div>

        <div class="declaration-box">
            <b>DECLARATION:</b><br>
            I solemnly undertake to accept and abide by the rules of the school. I hereby affirm that the entries made by me above are true to the best of my knowledge.
            <label class="agree-row"><input type="checkbox" id="agreeCheck" onchange="document.getElementById('submitBtn').disabled = !this.checked"> I agree to the above declaration.</label>
        </div>
        
        <button type="button" id="submitBtn" class="btn-main" onclick="openPre()" disabled>PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div id="pdfContent" class="pdf-page-preview"></div>
    <div style="text-align: center; margin-top: 20px; padding-bottom: 40px;">
        <button id="fBtn" onclick="sendData()" style="padding:15px; background:#1a5d1a; color:white; border:none; width:80%; font-weight:bold; cursor:pointer; border-radius:4px;">FINAL SUBMIT</button>
        
        <button id="pBtn" style="display:none; padding:12px 30px; background:#008000; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;" 
                onclick="if(window.AndroidPrint){ AndroidPrint.triggerPrint(); } else { triggerIframePrint(); }">
            PRINT / SAVE PDF
        </button>

        <button onclick="location.reload()" style="padding:10px 20px; background:#666; color:white; border:none; margin-left:10px; cursor:pointer; border-radius:4px;">BACK</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';
    let imgs = { p: "", s: "" }, finalDoc = null;

    // RESTORED GROUPING LOGIC
    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            const headers = await res.json();
            const div = document.getElementById('dynamicFields');
            const hidden = ["Photo of Student", "Signature", "Application No", "Serial No. of Admission", "Date of Admission"];
            
            const groups = {
                "PERSONAL DETAILS": ["Name of Student", "Father's Name", "Mother's Name", "Date of Birth", "Caste", "Category"],
                "CONTACT & ADDRESS": ["Mobile Number", "Permanent Residence"],
                "ACADEMIC DETAILS": ["Name & Place of Previous School", "Class in which reading"],
                "BANK DETAILS": ["Bank Name", "Bank Account Number", "IFSC", "Account Holder's Name"]
            };

            Object.entries(groups).forEach(([gTitle, fields]) => {
                div.innerHTML += `<div class="section-title">${gTitle}</div><div class="grid">`;
                fields.forEach(f => {
                    if(headers.includes(f)) {
                        div.lastElementChild.innerHTML += `<div class="field"><label>${f}</label><input type="${f.includes('Date')?'date':'text'}" name="${f}"></div>`;
                    }
                });
                div.innerHTML += `</div>`;
            });
        } catch(e) {}
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        if(i.files[0]) r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        renderDigitalPreview();
        document.getElementById('modal').style.display = 'block';
    }

    // RESTORED GRID TABLE PREVIEW
    function renderDigitalPreview(extra = {}) {
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        let html = `
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #000; padding-bottom:10px;">
                <div style="font-size:9px;">App No: ${extra.appNo || '...'} | Serial: ${extra.sNo || '...'}</div>
                <div style="text-align:center;">
                    <h3 style="margin:0; color:#960000;">ALIGARH MUSLIM UNIVERSITY</h3>
                    <p style="margin:0; font-size:10px;">Session 2026-27 | IQRA PUBLIC SCHOOL</p>
                    <div id="qrArea" style="display:flex; justify-content:center; margin-top:5px;"></div>
                </div>
                <div style="width:70px; height:80px; border:1px solid #000;">${imgs.p ? `<img src="${imgs.p}" style="width:100%; height:100%;">` : ''}</div>
            </div>
            
            <div class="group-head" style="margin-top:10px;">Personal Details</div>
            <table class="info-table">
                <tr><td class="label-cell">Student Name</td><td>${d['Name of Student'] || ''}</td><td class="label-cell">Father's Name</td><td>${d["Father's Name"] || ''}</td></tr>
                <tr><td class="label-cell">Mother's Name</td><td>${d["Mother's Name"] || ''}</td><td class="label-cell">Date of Birth</td><td>${d["Date of Birth"] || ''}</td></tr>
            </table>

            <div class="group-head">Bank Details</div>
            <table class="info-table">
                <tr><td class="label-cell">Bank Name</td><td>${d["Bank Name"] || ''}</td><td class="label-cell">A/C Number</td><td>${d["Bank Account Number"] || ''}</td></tr>
            </table>

            <div style="margin-top:30px; display:flex; justify-content:space-between; font-size:10px;">
                <div>${imgs.s ? `<img src="${imgs.s}" style="width:70px;height:25px;"><br>` : ''} ________________<br>Student</div>
                <div>________________<br>Guardian</div>
                <div>________________<br>Principal</div>
            </div>
        `;
        document.getElementById('pdfContent').innerHTML = html;
        if(extra.appNo) new QRCode(document.getElementById("qrArea"), { text: extra.appNo, width: 40, height: 40 });
    }

    async function sendData() {
        const b = document.getElementById('fBtn');
        b.innerText = "SAVING..."; b.disabled = true;
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        d.photoData = imgs.p; d.sigData = imgs.s;
        
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(d) });
            const r = await res.json();
            if(r.status === "Success") {
                renderDigitalPreview({appNo: r.appNo, sNo: r.sNo});
                b.style.display = "none";
                document.getElementById('pBtn').style.display = "inline-block";
                
                // Final PDF for Printing
                const { jsPDF } = window.jspdf;
                finalDoc = new jsPDF('p', 'mm', 'a4');
                finalDoc.text(`Admission Form - ${r.appNo}`, 15, 15);
                // (PDF layout details...)
            }
        } catch(e) { b.disabled = false; b.innerText = "FINAL SUBMIT"; }
    }

    // Chrome Fix using Iframe (No Pop-up issue)
    function triggerIframePrint() {
        if(!finalDoc) return;
        const pdfBase64 = finalDoc.output('datauristring');
        const old = document.getElementById('printFrame');
        if(old) old.remove();
        const iframe = document.createElement('iframe');
        iframe.id = 'printFrame'; iframe.style.display = 'none'; iframe.src = pdfBase64;
        document.body.appendChild(iframe);
        iframe.onload = () => { iframe.contentWindow.print(); };
    }
</script>
</body>
</html>
