<!DOCTYPE html>
<html>
<head>
    <title>Iqra Public School - Admission Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #1a5d1a; --gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-top: 10px solid var(--primary); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #333; }
        input[type="text"] { padding: 12px; border: 1px solid #ccc; border-radius: 4px; background: #fafafa; }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f9f9f9; padding: 20px; border: 1px dashed #2e7d32; margin-top: 20px; }
        .agreement { grid-column: span 2; margin-top: 20px; padding: 10px; border-top: 1px solid #eee; }
        .search-box { background: #e8f5e9; padding: 15px; border-radius: 5px; margin-bottom: 30px; display: flex; gap: 10px; align-items: center; }
        button { background: var(--primary); color: white; padding: 15px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #loader { text-align: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center;">
        <h1 style="color:var(--primary); margin:0;">IQRA PUBLIC SCHOOL</h1>
        <p>Mathurapur, Barsoi, Katihar, Bihar - 855102</p>
        <hr style="border: 1px solid var(--gold); width: 100px;">
    </div>

    <div class="search-box">
        <input type="text" id="searchApp" placeholder="Enter Application No. to Download" style="flex:1; padding:10px;">
        <button onclick="searchForm()" style="padding:10px 20px; background: var(--gold);">SEARCH</button>
    </div>

    <div id="loader">🔄 System is fetching latest columns from Google Sheet...</div>

    <form id="admissionForm" style="display:none;">
        <div id="dynamicFields" class="form-grid"></div>

        <div class="upload-section">
            <div>
                <label>Student Passport Photo</label>
                <input type="file" id="pIn" accept="image/*" required onchange="preview(this, 'pPrev')">
                <div id="pPrev" style="width:100px; height:120px; border:1px solid #ddd; margin-top:5px; background:white;"></div>
            </div>
            <div>
                <label>Student Signature</label>
                <input type="file" id="sIn" accept="image/*" required onchange="preview(this, 'sPrev')">
                <div id="sPrev" style="width:150px; height:50px; border:1px solid #ddd; margin-top:5px; background:white;"></div>
            </div>
        </div>

        <div class="agreement">
            <input type="checkbox" id="agree" required>
            <label for="agree" style="display:inline;"> I hereby declare that all information provided is true to the best of my knowledge.</label>
        </div>

        <button type="submit" id="subBtn" style="width:100%; font-size: 20px; margin-top:20px;">SUBMIT & GENERATE ADMISSION CARD</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxnMpRAZTkR6IABqToJNz8ZQxZ9vIK1IKcK0rKtT9v0LXyBdpSzCPo3CIuzRy0_z4GR/exec'; 
    let images = { photo: "", sig: "" };

    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            const headers = await res.json();
            const container = document.getElementById('dynamicFields');
            
            headers.forEach((h) => {
                const skip = ["Photo of Students", "Signature", "Application No"];
                if(!skip.includes(h.name) && h.name.trim() !== "") {
                    container.innerHTML += `
                        <div class="form-group">
                            <label>Cell ${h.index}: ${h.name}</label>
                            <input type="text" name="${h.name}" required>
                        </div>`;
                }
            });
            document.getElementById('loader').style.display = 'none';
            document.getElementById('admissionForm').style.display = 'block';
        } catch (e) { document.getElementById('loader').innerText = "Error loading fields!"; }
    };

    function preview(input, id) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%;">`;
            if(id === 'pPrev') images.photo = e.target.result;
            if(id === 'sPrev') images.sig = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    document.getElementById('admissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.innerText = "Generating Professional Form...";
        btn.disabled = true;

        const data = Object.fromEntries(new FormData(e.target));
        data.photoData = images.photo;
        data.sigData = images.sig;

        const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
        const result = await response.json();
        
        if(result.status === "Success") {
            data.AppNo = result.appNo;
            generateProfessionalPDF(data);
            alert("Success! App No: " + result.appNo);
        }
        btn.disabled = false;
        btn.innerText = "SUBMIT & GENERATE ADMISSION CARD";
    };

    function generateProfessionalPDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Header Style (Screenshot 2 jaisa)
        doc.rect(5, 5, 200, 287);
        doc.setFontSize(20);
        doc.setTextColor(26, 93, 26);
        doc.text("IQRA PUBLIC SCHOOL", 105, 20, {align:'center'});
        doc.setFontSize(10);
        doc.text("Mathurapur, Barsoi, Katihar-855102", 105, 26, {align:'center'});
        
        doc.setFontSize(14);
        doc.text("APPLICATION FORM FOR ADMISSION (2026-27)", 105, 40, {align:'center'});
        doc.text("App No: " + (data.AppNo || "Pending"), 20, 50);

        if(images.photo) doc.addImage(images.photo, 'JPEG', 160, 35, 35, 40);

        const tableData = Object.entries(data).filter(([k])=>!k.includes('Data')).map(([k,v])=>[k,v]);
        doc.autoTable({
            startY: 80,
            body: tableData,
            theme: 'grid',
            styles: { fontSize: 9, cellPadding: 2 },
            columnStyles: { 0: { fontStyle: 'bold', width: 60 } }
        });

        const finalY = doc.lastAutoTable.finalY + 20;
        doc.text("Declaration: I accept all terms.", 20, finalY);
        if(images.sig) doc.addImage(images.sig, 'JPEG', 150, finalY - 10, 40, 15);
        doc.text("Student Signature", 155, finalY + 15);

        doc.save("Iqra_Admission_" + data.AppNo + ".pdf");
    }

    function searchForm() {
        alert("Search feature connected to Application ID. Please use the generate button for real-time PDF.");
    }
</script>
</body>
</html>
