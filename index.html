<!DOCTYPE html>
<html>
<head>
    <title>Iqra Public School - Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #444; }
        input { padding: 8px; border: 1px solid #bbb; border-radius: 3px; }
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; padding: 15px; border: 1px dashed #888; }
        .preview { width: 100px; height: 120px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-main { background: var(--p); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* Modal Style */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-body { background: white; width: 90%; max-width: 700px; margin: 20px auto; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .pre-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .pre-table td { border: 1px solid #ddd; padding: 6px; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px 0; font-size: 12px;">Mathurapur, Barsoi, Katihar-855102 | Session 2026-27</p>
    </div>

    <div class="search-row">
        <input type="text" id="sApp" placeholder="Search App No..." style="flex:1;">
        <button onclick="alert('Searching...')" style="padding:5px 15px;">SEARCH</button>
    </div>

    <form id="admissionForm">
        <div id="dynamicFields" class="grid"></div>
        <div class="uploads">
            <div class="field">
                <label>1. Student Photo</label>
                <input type="file" accept="image/*" onchange="upImg(this, 'p-pre')">
                <div id="p-pre" class="preview" style="margin-top:5px;">PHOTO</div>
            </div>
            <div class="field">
                <label>2. Signature</label>
                <input type="file" accept="image/*" onchange="upImg(this, 's-pre')">
                <div id="s-pre" class="preview" style="margin-top:5px; width:180px; height:50px;">SIGNATURE</div>
            </div>
        </div>
        <button type="button" class="btn-main" onclick="openPre()">PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 style="text-align:center; border-bottom:1px solid #333;">FORM PREVIEW</h3>
        <div id="preContent"></div>
        <div style="background:#fff3cd; padding:10px; font-size:11px; margin-top:10px;">
            <b>Instruction:</b> Check all details. Once submitted, admission card will be generated.
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="document.getElementById('modal').style.display='none'" style="flex:1; padding:10px;">Edit</button>
            <button id="fBtn" onclick="sendData()" style="flex:2; padding:10px; background:var(--p); color:white; border:none; cursor:pointer;">FINAL SUBMIT & PRINT</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxqfYLSn70aFyPW7CtH0uXe5VSawo3Karj-n0ayXQOsTKq88YEuzTvklJOl5Poj5Kqx/exec';
    let imgs = { p: "", s: "" };

    window.onload = async () => {
        const res = await fetch(scriptURL);
        const headers = await res.json();
        const div = document.getElementById('dynamicFields');
        let n = 3;
        headers.forEach(h => {
            const head = h.trim();
            if(head && !["Photo of Students", "Signature", "Application No", "S.No"].includes(head)) {
                div.innerHTML += `<div class="field"><label>${n}. ${head}</label><input type="${head.toLowerCase().includes('date')?'date':'text'}" name="${head}"></div>`;
                n++;
            }
        });
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        const d = new FormData(document.getElementById('admissionForm'));
        let h = '<table class="pre-table">';
        d.forEach((v, k) => { h += `<tr><td><b>${k}</b></td><td>${v||'N/A'}</td></tr>`; });
        document.getElementById('preContent').innerHTML = h + '</table>';
        document.getElementById('modal').style.display = 'block';
    }

    async function sendData() {
        const b = document.getElementById('fBtn'); b.innerText = "Saving..."; b.disabled = true;
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        d.photoData = imgs.p; d.sigData = imgs.s;
        const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(d) });
        const r = await res.json();
        if(r.status === "Success") {
            d.AppNo = r.appNo;
            printAMU(d);
            alert("Success! App No: " + r.appNo);
            location.reload();
        }
    }

    function printAMU(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // 1. Border
        doc.rect(5, 5, 200, 287);
        
        // 2. AMU Style Header
        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("IQRA PUBLIC SCHOOL", 105, 18, {align:'center'});
        doc.setFontSize(9);
        doc.text("Mathurapur, Barsoi, Katihar-855102 | Session 2026-27", 105, 23, {align:'center'});
        doc.setFontSize(11);
        doc.text("ADMISSION CARD", 105, 30, {align:'center'});
        doc.line(85, 31, 125, 31);

        // 3. Photo & App No (AMU Style)
        if(imgs.p) doc.addImage(imgs.p, 'JPEG', 15, 40, 32, 38);
        doc.rect(15, 40, 32, 38);
        
        doc.setFontSize(10);
        doc.text("Application No: " + data.AppNo, 55, 45);
        doc.text("Status: SUBMITTED", 55, 51);
        doc.text("Nationality: Indian", 55, 57);

        // 4. Details Table (Manual Grid to match AMU)
        let y = 85;
        doc.setFontSize(9);
        const entries = Object.entries(data).filter(([k])=>!k.includes('Data'));
        
        entries.forEach((item, i) => {
            if(y > 250) { doc.addPage(); doc.rect(5, 5, 200, 287); y = 20; }
            doc.setFont("helvetica", "bold");
            doc.text(item[0].toUpperCase() + ":", 15, y);
            doc.setFont("helvetica", "normal");
            doc.text(String(item[1] || "N/A"), 80, y);
            doc.line(15, y+2, 195, y+2);
            y += 8;
        });

        // 5. Instructions
        y += 10;
        doc.setFontSize(8);
        doc.setFont("helvetica", "italic");
        doc.text("Declaration: I hereby declare that all information is true to my knowledge.", 15, y);
        
        // 6. Signature Section
        if(imgs.s) doc.addImage(imgs.s, 'JPEG', 150, y + 5, 35, 12);
        doc.line(150, y+18, 190, y+18);
        doc.text("Student Signature", 158, y+22);

        doc.save(data.AppNo + ".pdf");
    }
</script>
</body>
</html>
