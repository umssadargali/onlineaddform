<!DOCTYPE html>
<html>
<head>
    <title>Iqra Public School - Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 10px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .header { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #444; }
        input { padding: 10px; border: 1px solid #bbb; border-radius: 4px; }
        .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; padding: 15px; border: 1px dashed #888; }
        .preview { width: 100px; height: 120px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .declaration-box { margin-top: 20px; padding: 15px; background: #fffde7; border: 1px solid #ffe58f; border-radius: 4px; font-size: 13px; line-height: 1.6; color: #333; }
        .agree-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; color: var(--p); }
        .btn-main { background: var(--p); color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 4px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Modal Styles */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; overflow-y: auto; }
        .modal-body { background: white; width: 95%; max-width: 700px; margin: 20px auto; padding: 20px; border-radius: 8px; }
        .pre-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        .pre-table td { border: 1px solid #ddd; padding: 8px; }
        .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-print-box { display: none; background: #000; color: #fff; padding: 15px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 4px; text-align: center; }
        .btn-edit { background: #666; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:5px 0; font-size: 12px;">Mathurapur, Barsoi, Katihar-855102 | Session 2026-27</p>
    </div>

    <form id="admissionForm">
        <div id="dynamicFields" class="grid"></div>
        <div class="uploads">
            <div class="field">
                <label id="photoLabel">Photo</label>
                <input type="file" accept="image/*" onchange="upImg(this, 'p-pre')">
                <div id="p-pre" class="preview" style="margin-top:5px;">PHOTO</div>
            </div>
            <div class="field">
                <label id="sigLabel">Signature</label>
                <input type="file" accept="image/*" onchange="upImg(this, 's-pre')">
                <div id="s-pre" class="preview" style="margin-top:5px; width:180px; height:50px;">SIGNATURE</div>
            </div>
        </div>
        <div class="declaration-box">
            <b>DECLARATION:</b><br>
            I solemnly undertake to accept and abide by the rules of the school. I hereby affirm that the entries made by me above are true to the best of my knowledge.<br>
            <label class="agree-row">
                <input type="checkbox" id="agreeCheck" onchange="document.getElementById('submitBtn').disabled = !this.checked">
                I agree to the above declaration.
            </label>
        </div>
        <button type="button" id="submitBtn" class="btn-main" onclick="openPre()" disabled>PREVIEW & SUBMIT</button>
    </form>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 style="text-align:center; color: var(--p);">APPLICATION PREVIEW</h3>
        <hr>
        <div id="preContent"></div>
        <div id="qrHidden" style="display:none;"></div>
        
        <div class="action-btns">
            <button id="fBtn" onclick="sendData()" style="padding:15px; background:var(--p); color:white; border:none; cursor:pointer; font-weight:bold; border-radius:4px;">CONFIRM & FINAL SUBMIT</button>
            <button id="pBtn" class="btn-print-box">📥 DOWNLOAD / PRINT PDF</button>
            <button id="editBtn" class="btn-edit" onclick="document.getElementById('modal').style.display='none'">← Back to Edit</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';
    let imgs = { p: "", s: "" };
    let globalHeaders = [];

    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            globalHeaders = await res.json();
            const div = document.getElementById('dynamicFields');
            let n = 1;
            globalHeaders.forEach(h => {
                const head = h.trim();
                const hidden = ["Photo of Student", "Signature", "Application No", "Serial No. of Admission", "Date of Admission"];
                if(head && !hidden.includes(head)) {
                    let type = head.toLowerCase().includes('date') ? 'date' : 'text';
                    div.innerHTML += `<div class="field"><label>${n}. ${head}</label><input type="${type}" name="${head}"></div>`;
                    n++;
                }
            });
            document.getElementById('photoLabel').innerText = n + ". Student Photo";
            document.getElementById('sigLabel').innerText = (n + 1) + ". Signature";
        } catch(e) { console.log("Header Error"); }
    };

    function upImg(i, id) {
        const r = new FileReader();
        r.onload = (e) => {
            document.getElementById(id).innerHTML = `<img src="${e.target.result}">`;
            if(id === 'p-pre') imgs.p = e.target.result; else imgs.s = e.target.result;
        };
        if(i.files[0]) r.readAsDataURL(i.files[0]);
    }

    function openPre() {
        const d = new FormData(document.getElementById('admissionForm'));
        let h = '<table class="pre-table">';
        d.forEach((v, k) => { h += `<tr><td><b>${k}</b></td><td>${v||'N/A'}</td></tr>`; });
        document.getElementById('preContent').innerHTML = h + '</table>';
        document.getElementById('modal').style.display = 'block';
        document.getElementById('pBtn').style.display = 'none';
        document.getElementById('fBtn').style.display = 'block';
        document.getElementById('editBtn').style.display = 'block';
    }

    async function sendData() {
        const b = document.getElementById('fBtn'); 
        b.innerText = "Saving to Server... Please Wait"; b.disabled = true;
        
        const d = Object.fromEntries(new FormData(document.getElementById('admissionForm')));
        d.photoData = imgs.p; 
        d.sigData = imgs.s;
        
        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(d) });
            const r = await res.json();
            if(r.status === "Success") {
                d.FinalAppNo = r.appNo;
                d.FinalSNo = r.sNo;
                d.AdmissionDate = new Date().toLocaleDateString('en-GB');
                
                b.style.display = "none";
                document.getElementById('editBtn').style.display = "none";
                
                alert("Data Saved Successfully!");
                generatePDF(d);
            }
        } catch(e) { alert("Error saving data!"); b.disabled = false; b.innerText = "CONFIRM & FINAL SUBMIT"; }
    }

    function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // --- Spacing Fixes ---
        doc.rect(5, 5, 200, 287);
        doc.setFontSize(8); doc.setFont("helvetica", "bold");
        doc.text("Application Number: " + (data.FinalAppNo || ""), 10, 12);
        doc.text("Serial No of Admission: " + (data.FinalSNo || ""), 10, 17);
        doc.text("Date of Admission: " + (data.AdmissionDate || ""), 10, 22);

        doc.setFontSize(14); doc.setTextColor(150, 0, 0);
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("Session : 2026-27", 105, 21, {align:'center'});
        doc.text("Application Form for admission to Class IX", 105, 26, {align:'center'});
        doc.text("IQRA PUBLIC SCHOOL", 105, 31, {align:'center'});

        if(imgs.p) { doc.addImage(imgs.p, 'JPEG', 165, 10, 30, 38); doc.rect(165, 10, 30, 38); }

        const qrDiv = document.getElementById('qrHidden');
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: String(data.FinalAppNo), width: 100, height: 100 });
        
        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            if(qrCanvas) doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 92, 36, 22, 22); 

            let y = 65;
            const groups = [
                { t: "Personal Details", k: ["Name of Student", "Father's Name", "Mother's Name", "Date of Birth", "Caste", "Category"] },
                { t: "Contact & Address", k: ["Mobile Number", "Permanent Residence"] },
                { t: "Academic Details", k: ["Name & Place of Previous School", "Class in which reading"] },
                { t: "Bank Details", k: ["Bank Name", "Bank Account Number", "IFSC", "Account Holder's Name"] }
            ];

            groups.forEach(g => {
                doc.setFillColor(240, 240, 240); doc.rect(10, y, 190, 6, 'F');
                doc.setFontSize(9); doc.setFont("helvetica", "bold"); 
                doc.text(g.t.toUpperCase(), 12, y + 4.5);
                y += 10;
                
                doc.setFontSize(8);
                for (let i = 0; i < g.k.length; i += 2) {
                    let k1 = g.k[i], k2 = g.k[i+1];
                    // Col 1
                    doc.setFont("helvetica", "bold"); doc.text(k1 + ":", 12, y);
                    doc.setFont("helvetica", "normal"); doc.text(String(data[k1] || "N/A"), 48, y);
                    // Col 2
                    if(k2) {
                        doc.setFont("helvetica", "bold"); doc.text(k2 + ":", 105, y);
                        doc.setFont("helvetica", "normal"); doc.text(String(data[k2] || "N/A"), 142, y);
                    }
                    doc.setDrawColor(230); doc.line(10, y + 2, 200, y + 2);
                    y += 8;
                }
                y += 4;
            });

            y = 265;
            doc.setFontSize(8); doc.setFont("helvetica", "bold"); doc.text("DECLARATION:", 10, y);
            doc.setFont("helvetica", "normal");
            doc.text("I solemnly undertake to accept and abide by the rules of the school. I hereby affirm that the entries made above are true to the best of my knowledge.", 10, y + 4, {maxWidth: 180});

            y = 282;
            if(imgs.s) doc.addImage(imgs.s, 'JPEG', 10, y-12, 30, 10);
            doc.line(10, y, 50, y); doc.text("Student Signature", 15, y + 4);
            doc.line(80, y, 120, y); doc.text("Guardian's Signature", 85, y + 4);
            doc.line(150, y, 190, y); doc.text("Principal's Signature", 155, y + 4);

            // Button Logic
            const pBtn = document.getElementById('pBtn');
            pBtn.style.display = "block";
            pBtn.onclick = () => {
                doc.save(`Admission_${data["Name of Student"]}.pdf`);
                const pdfBlob = doc.output('blob');
                const url = URL.createObjectURL(pdfBlob);
                window.open(url, '_blank');
                setTimeout(() => location.reload(), 2000);
            };
        }, 1000);
    }
</script>
</body>
</html>
