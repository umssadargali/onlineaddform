<!DOCTYPE html>
<html>
<head>
    <title>IPS - Search Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 20px; text-align: center; }
        .box { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        .highlight { background: #d4af37; color: white; padding: 8px; font-weight: bold; margin: 15px 0; border-radius: 4px; display: inline-block; width: 90%; }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 12px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
    <p style="font-size:13px; margin:5px 0;">Mathurapur, Barsoi, Katihar</p>
    <div class="highlight">SEARCH ADMISSION FORM</div>

    <div class="input-group">
        <label>Student Full Name</label>
        <input type="text" id="sName" placeholder="Enter full name">
    </div>
    <div class="input-group">
        <label>Date of Birth</label>
        <input type="date" id="sDob">
    </div>
    <div style="margin:10px 0; color:#888; font-size:12px;">— OR —</div>
    <div class="input-group">
        <label>Aadhaar Number</label>
        <input type="number" id="sAadhar" placeholder="12 digit Aadhaar">
    </div>

    <button class="btn" onclick="search()">SEARCH & DOWNLOAD PDF</button>
    <p id="msg" style="display:none; color:var(--p); font-weight:bold;">Searching in Database...</p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwoPQTTMbHzNf9l6GrovN8vc7V8Ld0BWPyEQn2vVZqKDqjcUxXcP9gFb95ucxJa7Sl_/exec';

    // 1. DATE FIX FUNCTION: Timestamp ko saaf karne ke liye
    function formatDate(val) {
        if (!val) return "N/A";
        if (typeof val === 'string' && val.includes('T')) {
            return val.split('T')[0]; // Sirf 2015-03-11 rakhega
        }
        return val;
    }

    async function search() {
        const name = document.getElementById('sName').value;
        const dob = document.getElementById('sDob').value;
        const aadhar = document.getElementById('sAadhar').value;
        const msg = document.getElementById('msg');

        if(!name || (!dob && !aadhar)) return alert("Please fill Name and either DOB or Aadhaar");

        msg.style.display = "block";
        try {
            const res = await fetch(`${scriptURL}?searchName=${encodeURIComponent(name)}&searchDOB=${dob}&searchAadhar=${aadhar}`);
            const data = await res.json();
            msg.style.display = "none";

            if(data === "Not Found") {
                alert("No record found.");
            } else {
                printAMUGrid(data);
            }
        } catch(e) {
            msg.style.display = "none";
            alert("Connection Error!");
        }
    }

    function printAMUGrid(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        doc.rect(5, 5, 200, 287);
        
        doc.setFontSize(8); doc.setFont("helvetica", "bold");
        doc.text("Application Number: " + (data["Application No"] || "N/A"), 10, 12);
        doc.text("Serial No of Admission: " + (data["Serial no. of Admission"] || ""), 10, 16);
        doc.text("Date of Admission: " + formatDate(data["Date of Admission"]), 10, 20);

        doc.setFontSize(13); doc.setTextColor(150, 0, 0);
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("Session : 2026-27", 105, 20, {align:'center'});
        doc.text("Application Form for admission to Class IX", 105, 25, {align:'center'});
        doc.text("IQRA PUBLIC SCHOOL", 105, 30, {align:'center'});

        // Photo Handling
        const photoData = data["Photo of Student"] || data["Photo of Students"];
        if(photoData && photoData.startsWith("data:image")) {
            doc.addImage(photoData, 'JPEG', 165, 10, 30, 38);
        }
        doc.rect(165, 10, 30, 38);

        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: String(data["Application No"] || "IPS"), width: 100, height: 100 });
        
        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 92, 35, 20, 20); 

            let y = 62; 
            const groups = [
                { t: "Personal Details", k: ["Name of Student", "Father's Name", "Mother's Name", "Date of Birth", "Caste", "Category"] },
                { t: "Contact & Address", k: ["Mobile Number", "Permanent Residence", "Aadhaar Number"] },
                { t: "Academic Details", k: ["Name & Place of Previous School", "Class in which reading", "Class in which admitted"] },
                { t: "Bank Details", k: ["Bank Name", "Bank Account Number", "IFSC", "Account Holder's Name"] }
            ];

            doc.setFontSize(8);
            groups.forEach(g => {
                doc.setFillColor(240, 240, 240); doc.rect(10, y, 190, 5, 'F');
                doc.setFont("helvetica", "bold"); doc.text(g.t.toUpperCase(), 12, y + 3.8);
                y += 7; 

                for (let i = 0; i < g.k.length; i += 2) {
                    let k1 = g.k[i], k2 = g.k[i+1];
                    // Clean Date for display
                    let val1 = (k1.includes("Date")) ? formatDate(data[k1]) : (data[k1] || "N/A");
                    let val2 = (k2 && k2.includes("Date")) ? formatDate(data[k2]) : (data[k2] || "N/A");

                    doc.setFont("helvetica", "bold"); doc.text(k1 + ":", 12, y);
                    doc.setFont("helvetica", "normal"); doc.text(String(val1), 45, y);
                    
                    if(k2) {
                        doc.setFont("helvetica", "bold"); doc.text(k2 + ":", 105, y);
                        doc.setFont("helvetica", "normal"); doc.text(String(val2), 140, y);
                    }
                    doc.setDrawColor(200); doc.line(10, y+1.5, 200, y+1.5);
                    y += 7.5; 
                }
                y += 3; 
            });

            y = 262; 
            doc.setFontSize(7); doc.setFont("helvetica", "bold"); doc.text("DECLARATION:", 10, y);
            doc.setFont("helvetica", "normal");
            doc.text("I solemnly undertake to accept and abide by the rules of the school. I hereby affirm that the entries made above are true to the best of my knowledge.", 10, y + 3);

            y = 280; 
            const sigData = data["Signature"];
            if(sigData && sigData.startsWith("data:image")) {
                doc.addImage(sigData, 'JPEG', 10, y-10, 25, 7);
            }
            
            doc.line(10, y, 55, y); doc.text("Student Signature", 15, y + 3.5);
            doc.line(77, y, 122, y); doc.text("Guardian's Signature", 82, y + 3.5);
            doc.line(145, y, 190, y); doc.text("Principal's Signature", 150, y + 3.5);

            doc.save("Search_Admission_" + (data["Name of Student"] || "Form") + ".pdf");
        }, 800);
    }
</script>
</body>
</html>
