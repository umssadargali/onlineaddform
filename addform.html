<!DOCTYPE html>
<html>
<head>
    <title>IPS Data Manager</title>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Search Box Design */
        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        #searchBox { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 25px; outline: none; transition: 0.3s; }
        #searchBox:focus { border-color: var(--p); box-shadow: 0 0 8px rgba(26,93,26,0.2); }

        /* Table Design */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: var(--p); color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f1f8f1; }

        .btn-view { background: #b71c1c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        #loading { text-align: center; color: var(--p); font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2 style="color:var(--p); margin:0;">IPS Student Records</h2>
        <div class="search-wrapper">
            <input type="text" id="searchBox" onkeyup="filterTable()" placeholder="🔍 Student ka naam likhein...">
        </div>
    </div>

    <div id="loading">Data load ho raha hai, intezar karein...</div>

    <div class="table-container">
        <table id="studentTable" style="display:none;">
            <thead>
                <tr>
                    <th>App No</th>
                    <th>Student Name</th>
                    <th>Father's Name</th>
                    <th>Class</th>
                    <th>Aadhaar</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Aapka wahi purana URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';
    let allData = [];

    // Data fetch karne ka function
    async function loadData() {
        try {
            // Hum "action=readAll" bhej rahe hain (Agar script support kare) 
            // Ya fir bina parameters ke fetch kar rahe hain
            const res = await fetch(scriptURL);
            const data = await res.json();
            
            allData = Array.isArray(data) ? data : [data]; 
            renderTable(allData);
            
            document.getElementById('loading').style.display = "none";
            document.getElementById('studentTable').style.display = "table";
        } catch (e) {
            document.getElementById('loading').innerText = "Error: Data load nahi ho saka!";
        }
    }

    function renderTable(dataList) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        dataList.forEach((item, index) => {
            let row = `<tr>
                <td>${item["Application No"] || 'N/A'}</td>
                <td><b>${item["Name of Student"]}</b></td>
                <td>${item["Father's Name"]}</td>
                <td>${item["Class in which admitted"]}</td>
                <td>${item["Aadhaar Number"]}</td>
                <td><button class="btn-view" onclick="alert('Detais:\nName: ${item["Name of Student"]}\nMob: ${item["Mobile Number"]}')">VIEW</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // Search filter function
    function filterTable() {
        let input = document.getElementById("searchBox").value.toUpperCase();
        let table = document.getElementById("studentTable");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td")[1]; // Student Name column
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(input) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }

    // Page load hote hi data mangwao
    window.onload = loadData;
</script>

</body>
</html>
