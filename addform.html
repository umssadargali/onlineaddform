<!DOCTYPE html>
<html>
<head>
    <title>IPS - Final Success</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        /* Search Box */
        .search-area { max-width: 400px; margin: 20px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--p); }
        .search-area input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-find { background: var(--p); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Preview Area */
        #preview-wrap { display: none; padding-bottom: 50px; }
        .admit-card { 
            width: 210mm; min-height: 290mm; padding: 12mm; margin: 20px auto;
            background: white; border: 1.5px solid #333; box-sizing: border-box;
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        
        .header-top { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; line-height: 1.4; }
        .school-info { text-align: center; margin-top: -10px; }
        .school-info h2 { color: #b71c1c; margin: 0; font-size: 22px; }
        .school-info p { margin: 2px 0; font-size: 13px; font-weight: bold; }
        
        .qr-center { display: flex; justify-content: center; margin: 10px 0; }
        .photo-frame { position: absolute; top: 12mm; right: 12mm; width: 32mm; height: 40mm; border: 1.5px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .section-bar { background: #e0e0e0; font-weight: bold; padding: 6px 10px; border: 1px solid #999; font-size: 13px; margin-top: 15px; }
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table td { border: 1px solid #999; padding: 8px; font-size: 13px; width: 25%; }
        
        .footer-signs { margin-top: 60px; display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; }
        .sign-box { border-top: 1px solid #333; width: 50mm; text-align: center; padding-top: 5px; min-height: 40px; }
        .sign-box img { height: 35px; width: auto; display: block; margin: 0 auto 5px auto; }

        .action-footer { text-align: center; margin: 20px 0; }
        .btn-save { background: #2d5a27; color: white; border: none; padding: 12px 35px; border-radius: 5px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-save:disabled { background: #888; cursor: wait; }

        @media print {
            .search-area, .action-footer, .btn-back { display: none !important; }
            body { background: white; padding: 0; }
            .admit-card { margin: 0; border: none; box-shadow: none; width: 100%; }
            @page { size: portrait; margin: 0; }
        }
    </style>
</head>
<body>

<div class="search-area" id="search-box">
    <h2 style="text-align:center; color:var(--p); margin:0 0 20px 0;">IPS Portal</h2>
    <input type="text" id="sName" placeholder="Student Full Name">
    <input type="number" id="sAadhar" placeholder="Aadhaar Number">
    <button class="btn-find" onclick="searchData()">FIND & PREVIEW</button>
    <p id="load-status" style="display:none; text-align:center; color:orange; margin-top:10px;">Searching Database...</p>
</div>

<div id="preview-wrap">
    <div class="admit-card">
        <div class="header-top">
            <div>
                App No: <span id="v-app"></span><br>
                Roll No: <span id="v-roll"></span><br>
                Date: <span id="v-date"></span>
            </div>
        </div>

        <div class="school-info">
            <h2>ALIGARH MUSLIM UNIVERSITY</h2>
