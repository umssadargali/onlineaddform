<!DOCTYPE html>
<html>
<head>
    <title>IPS - Search & Download Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; }
        .box { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--p); text-align: center; }
        .highlight { background: #d4af37; color: white; padding: 10px; font-weight: bold; margin: 20px 0; border-radius: 6px; display: block; text-transform: uppercase; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 14px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 15px; }
        #msg { margin-top: 15px; font-size: 14px; color: var(--p); font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
    <div class="highlight">Find Admission Form</div>

    <div class="input-group">
        <label>Student Full Name</label>
        <input type="text" id="sName" placeholder="Enter Full Name">
    </div>
    <div class="input-group">
        <label>Aadhaar Number</label>
        <input type="number" id="sAadhar" placeholder="12 Digit Aadhaar">
    </div>

    <button class="btn" id="searchBtn" onclick="search()">SEARCH & DOWNLOAD PDF</button>
    <p id="msg">Processing your request...</p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';

    function formatDate(val) {
        if (!val) return "N/A";
        if (typeof val === 'string' && val.includes('T')) return val.split('T')[0];
        return val;
    }

    async function search() {
        const name = document.getElementById('sName').value.trim();
        const aadhar = document.getElementById('sAadhar').value.trim();
        const msg = document.getElementById('msg');
        const btn = document.getElementById('searchBtn');

        if(!name || !aadhar) return alert("Please enter Name and Aadhaar");

        msg.style.display = "block";
        btn.disabled = true;

        try {
            const res = await fetch(`${scriptURL}?searchName=${encodeURIComponent(name)}&searchAadhar=${aadhar}`);
            const student = await res.json();
            
            msg.style.display = "none";
            btn.disabled = false;

            if(student === "Not Found") {
                alert("Record not found!");
            } else {
                generatePDF(student);
            }
        } catch(e) {
            msg.style.display = "none";
            btn.disabled = false;
            alert("Connection Error!");
        }
    }

    function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // --- 1. Header & Design ---
        doc.setLineWidth(0.5); doc.rect(5, 5, 200, 287);
        doc.setFontSize(8); doc.setFont("helvetica", "bold");
        doc.text("App No: " + (data["Application No"] || "N/A"), 10, 12);
        doc.text("Roll No: " + (data["Serial No. of Admission"] || "N/A"), 10, 16);
        
        doc.setFontSize(14); doc.setTextColor(183, 28, 28);
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("IQRA PUBLIC SCHOOL", 105, 20, {align:'center'});
        doc.setFont("helvetica", "bold"); doc.text("Admission Form (2026-27)", 105, 26, {align:'center'});

        // --- 2. Image Logic (The Fix) ---
        // Automatically find photo and signature from any column containing "data:image"
        let photo = "";
        let sign = "";
        Object.keys(data).forEach(key => {
            const val = String(data[key]);
            if(val.startsWith("data:image")) {
                if(key.toLowerCase().includes("photo")) photo = val;
                else if(key.toLowerCase().includes("signature") || key.toLowerCase().includes("sign")) sign = val;
            }
        });

        // Photo placement
        doc.rect(165, 10, 30, 38); 
        if (photo) {
            try { doc.addImage(photo, 'JPEG', 165, 10, 30, 38); } catch(e) { console.log("Photo error"); }
        }

        // QR Code
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: String(data["Application No"] || "IPS"), width: 100, height: 100 });
        
        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 92, 32, 22, 22);

            // --- 3. Data Grid ---
            let y = 62;
            const sections = [
                { t: "Personal Details", k: ["Name of Student", "Father's Name", "Mother's Name", "Date of Birth", "Aadhaar Number"] },
                { t: "Academic Details", k: ["Name & Place of Previous School", "Class in which reading", "Class in which admitted"] },
                { t: "Bank Details", k: ["Bank Name", "Bank Account Number", "IFSC"] }
            ];

            sections.forEach(s => {
                doc.setFillColor(240); doc.rect(10, y, 190, 6, 'F');
                doc.setFontSize(9); doc.setFont("helvetica", "bold");
                doc.text(s.t.toUpperCase(), 12, y + 4.5);
                y += 8;

                s.k.forEach(key => {
                    doc.setFontSize(8); doc.setFont("helvetica", "bold");
                    doc.text(key + ":", 12, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(String(data[key] || "N/A"), 60, y);
                    doc.setDrawColor(220); doc.line(10, y + 1.5, 200, y + 1.5);
                    y += 7;
                });
                y += 2;
            });

            // --- 4. Signature Logic ---
            if (sign) {
                try { doc.addImage(sign, 'JPEG', 15, 268, 30, 10); } catch(e) { console.log("Sign error"); }
            }
            doc.line(10, 280, 50, 280); doc.text("Student Signature", 15, 284);
            doc.line(160, 280, 200, 280); doc.text("Principal", 170, 284);

            doc.save("Admission_" + data["Name of Student"] + ".pdf");
        }, 1000);
    }
</script>
</body>
</html>
