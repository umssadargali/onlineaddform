<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Admit Card - IQRA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .no-print { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #1a5d1a; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        .btn-search { background: #1a5d1a; color: white; padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        /* Admit Card Container */
        #admitCardArea { display: none; margin-top: 20px; }
        .admit-card { width: 148mm; min-height: 210mm; padding: 10mm; margin: auto; background: white; border: 1.5px solid #000; box-sizing: border-box; position: relative; }
        
        /* AMU Style Header */
        .ac-header { text-align: center; border-bottom: 2px solid #b71c1c; padding-bottom: 10px; }
        .ac-title { background: #000; color: #fff; display: inline-block; padding: 4px 20px; font-weight: bold; margin-top: 10px; font-size: 14px; letter-spacing: 1px; }
        
        .info-row { display: flex; justify-content: space-between; margin-top: 20px; align-items: flex-start; }
        .photo-box { width: 95px; height: 115px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fdfdfd; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .ac-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ac-table td { border: 1px solid #ddd; padding: 10px; font-size: 14px; }
        .lbl { background: #f8f8f8; font-weight: bold; width: 35%; color: #333; }
        
        .inst { border: 1px dashed #555; padding: 10px; font-size: 11px; margin-top: 20px; line-height: 1.5; color: #222; }
        
        /* Signature Area */
        .signs { display: flex; justify-content: space-between; margin-top: 45px; font-size: 12px; text-align: center; }
        .sign-img { max-width: 130px; max-height: 45px; display: block; margin: 0 auto 5px auto; }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            #admitCardArea { display: block !important; margin: 0; }
            .admit-card { border: 2px solid #000; width: 100%; height: auto; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="color: #1a5d1a; margin-bottom: 5px;">IQRA PUBLIC SCHOOL</h2>
    <p style="font-size: 14px; color: #666;">Enter Details to Get Your Hall Ticket</p>
    <input type="text" id="sName" placeholder="Candidate's Full Name">
    <input type="text" id="sAadhar" placeholder="Aadhaar Number">
    <button class="btn-search" id="searchBtn" onclick="findStudent()">GENERATE ADMIT CARD</button>
</div>

<div id="admitCardArea">
    <div class="admit-card" id="cardContent">
        </div>
    
    <div style="text-align: center; margin: 25px 0;" class="no-print">
        <button class="btn-search" style="width: 200px;" onclick="window.print()">PRINT / SAVE PDF</button>
        <button class="btn-search" style="width: 150px; background: #666; margin-left: 10px;" onclick="location.reload()">NEW SEARCH</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';

    async function findStudent() {
        const name = document.getElementById('sName').value.trim();
        const aadhar = document.getElementById('sAadhar').value.trim();
        const btn = document.getElementById('searchBtn');
        
        if(!name || !aadhar) {
            alert("Please enter both Name and Aadhaar Number.");
            return;
        }

        btn.innerText = "Searching Database...";
        btn.disabled = true;

        try {
            // Using doGet for search as defined in your Google Script
            const response = await fetch(`${scriptURL}?searchName=${encodeURIComponent(name)}&searchAadhar=${encodeURIComponent(aadhar)}`);
            const student = await response.json();

            if(student === "Not Found") {
                alert("No record found. Please verify the Name and Aadhaar Number.");
                btn.innerText = "GENERATE ADMIT CARD";
                btn.disabled = false;
            } else {
                renderAdmitCard(student);
                document.querySelector('.no-print').style.display = 'none';
                document.getElementById('admitCardArea').style.display = 'block';
            }
        } catch(e) {
            alert("Connection Error. Please try again.");
            btn.innerText = "GENERATE ADMIT CARD";
            btn.disabled = false;
        }
    }

    function renderAdmitCard(student) {
        const container = document.getElementById('cardContent');
        
        // Handling Photo & Signature
        const photo = student["Photo of Student"] || "";
        const signature = student["Signature"] || "";

        container.innerHTML = `
            <div class="ac-header">
                <h2 style="margin:0; color:#b71c1c; font-size: 22px;">ALIGARH MUSLIM UNIVERSITY</h2>
                <h3 style="margin:5px 0; color:#333;">IQRA PUBLIC SCHOOL</h3>
                <p style="margin:0; font-size:12px;">Session 2026-27 | Admission Test</p>
                <div class="ac-title">HALL TICKET / ADMIT CARD</div>
            </div>

            <div class="info-row">
                <div style="font-size:13px; line-height:1.9;">
                    <b>Application No:</b> ${student["Application No"] || 'N/A'}<br>
                    <b>Roll Number:</b> ${student["Serial No. of Admission"] || 'N/A'}<br>
                    <b>Date of Exam:</b> 25-03-2026<br>
                    <b>Reporting Time:</b> 09:30 AM
                </div>
                <div style="text-align:center;">
                    <div class="photo-box">
                        ${photo ? `<img src="${photo}">` : '<span style="font-size:10px;color:#999;">PASTE PHOTO</span>'}
                    </div>
                    <div id="ac_qr" style="margin-top:8px; display:flex; justify-content:center;"></div>
                </div>
            </div>

            <table class="ac-table">
                <tr><td class="lbl">Candidate Name</td><td>${student["Name of Student"] || ''}</td></tr>
                <tr><td class="lbl">Father's Name</td><td>${student["Father's Name"] || ''}</td></tr>
                <tr><td class="lbl">Class Applied</td><td>${student["Class in which admitted"] || 'N/A'}</td></tr>
                <tr><td class="lbl">Exam Centre</td><td>IQRA PUBLIC SCHOOL, MATHURAPUR, BARSOI</td></tr>
            </table>

            <div class="inst">
                <b>CANDIDATE INSTRUCTIONS:</b><br>
                1. Entry without this Hall Ticket is strictly prohibited.<br>
                2. Use only Blue/Black ballpoint pen for the entrance test.<br>
                3. Electronic gadgets (mobiles, calculators) are not allowed inside.<br>
                4. Maintain silence and discipline during the examination.
            </div>

            <div class="signs">
                <div style="width: 160px;">
                    <div style="height:45px; display:flex; align-items:flex-end; justify-content:center;">
                        ${signature ? `<img src="${signature}" class="sign-img">` : ''}
                    </div>
                    <div style="border-top:1.5px solid #000; padding-top:5px; font-weight:bold;">Candidate Signature</div>
                </div>
                <div style="width: 160px;">
                    <div style="height:45px;"></div>
                    <div style="border-top:1.5px solid #000; padding-top:5px; font-weight:bold;">Controller of Exams</div>
                </div>
            </div>
        `;

        // Generate QR Code
        new QRCode(document.getElementById("ac_qr"), {
            text: student["Application No"] || "N/A",
            width: 55,
            height: 55,
            colorDark : "#000000",
            colorLight : "#ffffff"
        });
    }
</script>

</body>
</html>
