<!DOCTYPE html>
<html>
<head>
    <title>IPS - Search & Print Form</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); padding: 20px; text-align: center; }
        .search-box { max-width: 500px; margin: 30px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        
        .header h2 { color: var(--p); margin: 0; text-transform: uppercase; }
        .sub-heading { font-size: 14px; margin: 5px 0; color: #555; }
        .highlight-bar { background: #d4af37; color: white; padding: 8px; font-weight: bold; margin: 15px 0; border-radius: 4px; display: inline-block; width: 90%; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .btn-search { background: var(--p); color: white; border: none; padding: 12px 25px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn-search:hover { opacity: 0.9; }
        .loader { display: none; margin-top: 10px; font-style: italic; color: var(--p); }
    </style>
</head>
<body>

<div class="search-box">
    <div class="header">
        <h2>Iqra Public School</h2>
        <p class="sub-heading">Mathurapur, Barsoi, Katihar</p>
    </div>
    
    <div class="highlight-bar">ADMISSION FORM</div>

    <div style="margin-top: 20px;">
        <div class="input-group">
            <label>Student Full Name (As per Sheet)</label>
            <input type="text" id="searchName" placeholder="Enter Student Name...">
        </div>
        <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" id="searchDOB">
        </div>
        
        <button class="btn-search" onclick="findAndPrint()">SEARCH & DOWNLOAD PDF</button>
        <div id="loader" class="loader">Searching record, please wait...</div>
    </div>
</div>

<script>
    // Apka wahi Script URL jo main form mein hai
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyeH00fK1v7ur18aZRlo_yvLGv1cGWl_JLU5s4Ec4NfV_ARSG4yq85W_-zxNOGlDfuB/exec';

    async function findAndPrint() {
        const name = document.getElementById('searchName').value.trim();
        const dob = document.getElementById('searchDOB').value;
        const loader = document.getElementById('loader');

        if (!name || !dob) {
            alert("Please enter both Name and Date of Birth");
            return;
        }

        loader.style.display = "block";

        try {
            // Hum Apps Script ko name aur dob parameters bhej rahe hain
            const response = await fetch(`${scriptURL}?searchName=${encodeURIComponent(name)}&searchDOB=${dob}`);
            const result = await response.json();

            if (result === "Not Found") {
                alert("No record found with this Name and Date of Birth.");
            } else {
                // Agar data mil gaya, toh PDF generate karein
                printAMU(result);
            }
        } catch (e) {
            alert("Error connecting to server.");
            console.error(e);
        } finally {
            loader.style.display = "none";
        }
    }

    function printAMU(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // PDF Design logic (Wahi jo aapne di thi)
        doc.rect(5, 5, 200, 287);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.setTextColor(150, 0, 0); 
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10);
        doc.setTextColor(0);
        doc.text("Session : 2026-27", 105, 20, {align:'center'});
        doc.text("Application Form for admission to Class IX", 105, 25, {align:'center'});
        doc.text("IQRA PUBLIC SCHOOL", 105, 30, {align:'center'});

        // Student Photo
        if(data["Photo of Students"]) {
            doc.addImage(data["Photo of Students"], 'JPEG', 160, 10, 35, 42); 
            doc.rect(160, 10, 35, 42); 
        }

        // QR Code
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: data["Application No"] || "N/A", width: 100, height: 100 });
        
        setTimeout(() => {
            const qrCanvas = qrDiv.querySelector('canvas');
            const qrData = qrCanvas.toDataURL("image/png");
            doc.addImage(qrData, 'PNG', 90, 35, 25, 25); 

            let y = 70;
            const groups = [
                { t: "Personal Details", k: ["Name of Students", "Father's Name", "Mother's Name", "Date of Birth", "Caste", "Category"] },
                { t: "Contact & Address", k: ["Mobile Number", "Permanent Residence(Village, PO, PS and District)"] },
                { t: "Bank Details", k: ["Bank Name", "Bank Account Number", "IFSC", "Account Holder's Name"] },
                { t: "Academic Details", k: ["Name & Place of Previous School", "Class in which reading", "T.C No.", "Date of T.C"] }
            ];

            groups.forEach(g => {
                doc.setFillColor(240, 240, 240);
                doc.rect(10, y, 190, 6, 'F');
                doc.setFont("helvetica", "bold");
                doc.setFontSize(9);
                doc.text(g.t.toUpperCase(), 12, y + 4.5);
                y += 10;

                g.k.forEach(key => {
                    let val = data[key] || "N/A";
                    doc.setFont("helvetica", "bold");
                    doc.text(key + ":", 12, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(String(val), 75, y);
                    doc.line(10, y+1.5, 200, y+1.5);
                    y += 8;
                });
                y += 5;
            });

            // Footer / Signature
            if(data["Signature"]) {
                doc.addImage(data["Signature"], 'JPEG', 160, 268, 30, 10);
            }
            doc.line(160, 280, 195, 280);
            doc.text("Student Signature", 165, 284);

            doc.save("Admission_" + data["Name of Students"] + ".pdf");
        }, 500);
    }
</script>
</body>
</html>
