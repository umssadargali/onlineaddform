<!DOCTYPE html>
<html>
<head>
    <title>IPS - Search & Download Admission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #1a5d1a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 20px; text-align: center; }
        .box { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--p); }
        .highlight { background: #d4af37; color: white; padding: 10px; font-weight: bold; margin: 20px 0; border-radius: 6px; display: block; }
        input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
        .btn { background: var(--p); color: white; border: none; padding: 14px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; }
        #msg { margin-top: 15px; font-size: 14px; color: var(--p); font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--p); margin:0;">IQRA PUBLIC SCHOOL</h2>
    <div class="highlight">SEARCH ADMISSION FORM</div>
    <input type="text" id="sName" placeholder="Student Full Name">
    <input type="number" id="sAadhar" placeholder="12 Digit Aadhaar Number">
    <button class="btn" id="searchBtn" onclick="search()">FIND & SAVE PDF</button>
    <p id="msg">Fetching Data & Images...</p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbbDQxqzxcXMozsYgwf04wNmLwMoZMdNqaqkzOo7wcQB-ZGmHXv-i7-dg9I-hzi_uj/exec';

    // Universal Image Fix: Drive link ko direct image link mein badalta hai
    function fixImageUrl(url) {
        if (!url) return "";
        if (url.includes("drive.google.com")) {
            let id = "";
            if (url.includes("id=")) id = url.split("id=")[1].split("&")[0];
            else id = url.split("/d/")[1].split("/")[0];
            return `https://lh3.googleusercontent.com/u/0/d/${id}`;
        }
        return url; // Agar Base64 hai toh waisa hi rehne dega
    }

    async function search() {
        const name = document.getElementById('sName').value.trim();
        const aadhar = document.getElementById('sAadhar').value.trim();
        const msg = document.getElementById('msg');
        if(!name || !aadhar) return alert("Please enter Name and Aadhaar");

        msg.style.display = "block";
        try {
            const res = await fetch(`${scriptURL}?searchName=${encodeURIComponent(name)}&searchAadhar=${aadhar}`);
            const data = await res.json();
            if(data === "Not Found") {
                alert("No record found!");
                msg.style.display = "none";
            } else {
                generatePDF(data);
            }
        } catch(e) {
            msg.style.display = "none";
            alert("Connection Error!");
        }
    }

    async function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        // Header & Design
        doc.setLineWidth(0.5); doc.rect(5, 5, 200, 287);
        doc.setFontSize(14); doc.setTextColor(183, 28, 28);
        doc.text("ALIGARH MUSLIM UNIVERSITY", 105, 15, {align:'center'});
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("IQRA PUBLIC SCHOOL", 105, 22, {align:'center'});

        // Image Processing
        const photoUrl = fixImageUrl(data["Photo of Student"] || data["photoData"]);
        const signUrl = fixImageUrl(data["Signature"] || data["sigData"]);

        // Helper function to load any image format
        const addImageToDoc = (url, x, y, w, h) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = function() {
                    doc.addImage(this, 'JPEG', x, y, w, h);
                    resolve();
                };
                img.onerror = () => resolve(); // Skip if fails
                img.src = url;
            });
        };

        // QR Code
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, { text: data["Application No"] || "IPS", width: 100, height: 100 });

        setTimeout(async () => {
            // Load Photo and Sign
            if(photoUrl) await addImageToDoc(photoUrl, 165, 10, 30, 38);
            if(signUrl) await addImageToDoc(signUrl, 15, 268, 30, 10);
            
            const qrCanvas = qrDiv.querySelector('canvas');
            doc.addImage(qrCanvas.toDataURL("image/png"), 'PNG', 92, 35, 20, 20);

            // Data Table Logic
            doc.setFontSize(9); doc.setFont("helvetica", "bold");
            doc.text("PERSONAL DETAILS", 12, 65);
            doc.setFont("helvetica", "normal");
            doc.text(`Student Name: ${data["Name of Student"] || 'N/A'}`, 12, 72);
            doc.text(`Father's Name: ${data["Father's Name"] || 'N/A'}`, 12, 79);
            doc.text(`Aadhaar Number: ${data["Aadhaar Number"] || 'N/A'}`, 12, 86);

            doc.line(10, 280, 55, 280); doc.text("Student Signature", 15, 284);
            
            document.getElementById('msg').style.display = "none";
            
            // Save Dialog Box Open
            doc.save(`Admission_${data["Name of Student"]}.pdf`);
        }, 1500);
    }
</script>
</body>
</html>
